<!DOCTYPE html>

<body>
  <div class="header-container">
    <h1>Fibonacci Swing Analyzer</h1>
    <div class="sub">Live data · Daily + 1H Heikin Ashi · All Fibonacci parameters · 2-day to 2-week holds</div>
    <form class="row" onsubmit="event.preventDefault(); run();">
      <input id="tk" type="text" placeholder="Ticker — e.g. AAPL, TSLA, SPY" style="text-transform: uppercase;"
        oninput="this.value = this.value.toUpperCase()" />
      <button type="submit" id="btn">Analyze</button>
    </form>
    <div id="st"></div>
  </div>
  <div id="res"></div>
  <script>
    const TD_KEY = '934f233f1c934c92a767bb9e52191d6d';
    const PROXIES = [
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    ];
    const YH_HOSTS = ['query1.finance.yahoo.com', 'query2.finance.yahoo.com'];
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function fetchTD(ticker, interval, outputsize) {
      const ivMap = { '1d': '1day', '1h': '1h', '15m': '15min' };
      const url = `https://api.twelvedata.com/time_series?symbol=${ticker}&interval=${ivMap[interval]}&outputsize=${outputsize}&apikey=${TD_KEY}`;
      const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
      const d = await r.json();
      if (d.status === 'error') throw new Error('Twelve Data: ' + d.message);
      if (!d.values || !d.values.length) throw new Error('Twelve Data: no values returned');
      return d.values.slice().reverse().map(v => ({
        date: new Date(v.datetime),
        o: parseFloat(v.open), h: parseFloat(v.high),
        l: parseFloat(v.low), c: parseFloat(v.close),
        v: parseInt(v.volume) || 0
      })).filter(b => !isNaN(b.c));
    }

    async function tryYH(url) {
      const t = (await (await fetch(url, { headers: { 'Accept': 'application/json' } })).text()).trim();
      if (!t.startsWith('{') && !t.startsWith('[')) throw new Error('Non-JSON: ' + t.slice(0, 60));
      const d = JSON.parse(t);
      if (d.chart?.error?.description) throw new Error(d.chart.error.description);
      if (!d.chart?.result?.[0]) throw new Error('No data');
      const res = d.chart.result[0]; const q = res.indicators.quote[0];
      return res.timestamp.map((t, j) => ({
        date: new Date(t * 1000), o: q.open[j], h: q.high[j], l: q.low[j], c: q.close[j], v: q.volume[j] || 0
      })).filter(b => b.c != null && b.h != null && b.l != null && b.o != null);
    }

    async function fetchBars(ticker, interval, range, stEl) {
      if (stEl) stEl.textContent = 'Fetching from Twelve Data...';
      try {
        const size = interval === '1d' ? 130 : (interval === '15m' ? 20 : 120);
        return await fetchTD(ticker, interval, size);
      } catch (e) {
        if (stEl) stEl.textContent = 'Twelve Data failed, trying fallback...';
        await sleep(300);
      }
      const qs = `/v8/finance/chart/${ticker}?interval=${interval}&range=${range}&includePrePost=false`;
      let attempt = 0, lastErr;
      for (const host of YH_HOSTS) {
        for (const proxy of PROXIES) {
          attempt++;
          if (stEl) stEl.textContent = `Fallback route ${attempt}/4...`;
          try { return await tryYH(proxy('https://' + host + qs)); }
          catch (e) { lastErr = e; await sleep(400); }
        }
      }
      throw new Error('All sources failed: ' + lastErr.message);
    }

    async function fetchVIX() {
      const PROXY_URL = 'https://vix-proxy.onrender.com/vix';
      const r = await fetch(PROXY_URL, { signal: AbortSignal.timeout(10000) });
      if (!r.ok) throw new Error(`Proxy HTTP ${r.status}`);
      const j = await r.json();
      const price = j.price;
      const prev = j.previousClose;
      return { price, pct: prev ? (price - prev) / prev * 100 : null };
    }

    async function fetchMacro(stEl) {
      if (stEl) stEl.textContent = 'Fetching macro data...';

      async function getIndexData(sym) {
        const bars = await fetchTD(sym, '1d', 100);
        const closes = bars.map(b => b.c);
        const e21 = ema(closes, 21);
        const e55 = ema(closes, 55);
        return {
          price: closes[closes.length - 1],
          ema21: e21[e21.length - 1],
          ema55: e55[e55.length - 1]
        };
      }

      let spy = null, qqq = null, iwm = null, dia = null, vix = null;
      try { spy = await getIndexData('SPY'); } catch (e) { }
      try { qqq = await getIndexData('QQQ'); } catch (e) { }
      try { iwm = await getIndexData('IWM'); } catch (e) { }
      try { dia = await getIndexData('DIA'); } catch (e) { }
      try { const v = await fetchVIX(); vix = v.price; } catch (e) { }
      return {
        spyPrice: spy?.price, spyEMA21: spy?.ema21, spyEMA55: spy?.ema55,
        qqqPrice: qqq?.price, qqqEMA21: qqq?.ema21, qqqEMA55: qqq?.ema55,
        iwmPrice: iwm?.price, iwmEMA21: iwm?.ema21, iwmEMA55: iwm?.ema55,
        diaPrice: dia?.price, diaEMA21: dia?.ema21, diaEMA55: dia?.ema55,
        vix
      };

    }

    function ema(a, n) { const k = 2 / (n + 1), o = new Array(a.length).fill(null); let f = -1; for (let i = 0; i < a.length; i++) { if (a[i] == null) continue; if (f < 0) { o[i] = a[i]; f = i; continue; } if (o[i - 1] != null) o[i] = a[i] * k + o[i - 1] * (1 - k); } return o; }
    function sma(a, n) { const o = new Array(a.length).fill(null); for (let i = n - 1; i < a.length; i++) { let s = 0; for (let j = i - n + 1; j <= i; j++)s += a[j]; o[i] = s / n; } return o; }
    function wilder(a, n) { const o = new Array(a.length).fill(null); let s = 0, st = -1; for (let i = 0; i < a.length; i++) { if (a[i] == null) continue; if (st < 0) st = i; const idx = i - st; if (idx < n) s += a[i]; if (idx === n - 1) o[i] = s / n; else if (idx >= n && o[i - 1] != null) o[i] = (o[i - 1] * (n - 1) + a[i]) / n; } return o; }
    function rStd(a, n) { const o = new Array(a.length).fill(null); for (let i = n - 1; i < a.length; i++) { const sl = a.slice(i - n + 1, i + 1).filter(x => x != null); if (sl.length < n) continue; const m = sl.reduce((a, b) => a + b, 0) / sl.length; o[i] = Math.sqrt(sl.reduce((a, b) => a + (b - m) ** 2, 0) / sl.length); } return o; }
    function ha(bars) { const r = []; for (let i = 0; i < bars.length; i++) { const b = bars[i]; const hc = (b.o + b.h + b.l + b.c) / 4; const ho = i === 0 ? (b.o + b.c) / 2 : (r[i - 1].ho + r[i - 1].hc) / 2; r.push({ ...b, ho, hh: Math.max(b.h, ho, hc), hl: Math.min(b.l, ho, hc), hc }); } return r; }
    function atr(bars, n) { const tr = bars.map((b, i) => { if (i === 0) return b.h - b.l; const p = bars[i - 1].c; return Math.max(b.h - b.l, Math.abs(b.h - p), Math.abs(b.l - p)); }); return wilder(tr, n); }
    function mfi(bars, n) { const o = new Array(bars.length).fill(null); for (let i = n - 1; i < bars.length; i++) { let pf = 0, nf = 0; for (let j = i - n + 1; j <= i; j++) { const prevIdx = Math.max(j - 1, 0); const tp = (bars[j].h + bars[j].l + bars[j].c) / 3, pt = (bars[prevIdx].h + bars[prevIdx].l + bars[prevIdx].c) / 3; const rmf = tp * bars[j].v; if (tp >= pt) pf += rmf; else nf += rmf; } o[i] = nf === 0 ? 100 : 100 - 100 / (1 + pf / nf); } return o; }
    function obv(bars) { const o = new Array(bars.length).fill(0); for (let i = 1; i < bars.length; i++) { if (bars[i].c > bars[i - 1].c) o[i] = o[i - 1] + bars[i].v; else if (bars[i].c < bars[i - 1].c) o[i] = o[i - 1] - bars[i].v; else o[i] = o[i - 1]; } return o; }
    function efi(bars, en, sn) { const raw = bars.map((b, i) => i === 0 ? 0 : (b.c - bars[i - 1].c) * b.v); const e = ema(raw, en); const mu = sma(e, sn); const sig = rStd(e, sn); return { e, mu, sig }; }
    function rsi(closes, n) { const g = [], l = []; for (let i = 1; i < closes.length; i++) { const d = closes[i] - closes[i - 1]; g.push(Math.max(d, 0)); l.push(Math.max(-d, 0)); } const ag = wilder(g, n), al = wilder(l, n); const o = [null]; for (let i = 0; i < ag.length; i++) { if (ag[i] == null) { o.push(null); continue; } o.push(al[i] === 0 ? 100 : 100 - 100 / (1 + ag[i] / al[i])); } return o; }
    function macd(closes, f, s, sg) { const ef = ema(closes, f), es = ema(closes, s); const ml = closes.map((_, i) => ef[i] != null && es[i] != null ? ef[i] - es[i] : null); const sl = ema(ml, sg); const h = ml.map((v, i) => v != null && sl[i] != null ? v - sl[i] : null); return { ml, sl, h }; }
    function bbw(closes, n) { const m = sma(closes, n); const o = new Array(closes.length).fill(null); for (let i = n - 1; i < closes.length; i++) { const sl = closes.slice(i - n + 1, i + 1); const mn = m[i]; const sd = Math.sqrt(sl.reduce((a, b) => a + (b - mn) ** 2, 0) / n); if (mn !== 0) o[i] = (4 * sd) / mn; } return o; }
    function adx(bars, n) { const tr = [], pdm = [], ndm = []; for (let i = 1; i < bars.length; i++) { const h = bars[i].h, l = bars[i].l, ph = bars[i - 1].h, pl = bars[i - 1].l, pc = bars[i - 1].c; tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc))); const up = h - ph, dn = pl - l; pdm.push(up > dn && up > 0 ? up : 0); ndm.push(dn > up && dn > 0 ? dn : 0); } const atr = wilder(tr, n), ap = wilder(pdm, n), an = wilder(ndm, n); const o = new Array(bars.length).fill(null); const dx = []; for (let i = 0; i < atr.length; i++) { if (atr[i] == null || atr[i] === 0) { dx.push(null); continue; } const pi = 100 * ap[i] / atr[i], ni = 100 * an[i] / atr[i]; const d = pi + ni === 0 ? null : 100 * Math.abs(pi - ni) / (pi + ni); dx.push(d); } const adxArr = wilder(dx, n); for (let i = 0; i < adxArr.length; i++)o[i + 1] = adxArr[i]; return o; }
    function getSMC(bars) {
      const n = bars.length;
      if (n < 20) return { structure: 'neutral', lastEvent: 'none', poi: 'none', breakdown: { structure: 0, ob: 0, fvg: 0 } };

      const swings = [];
      const win = 3;
      for (let i = win; i < n - win; i++) {

        for (let j = i - win; j <= i + win; j++) {
          if (j === i) continue;
          if (bars[j].h > bars[i].h) isHigh = false;
          if (bars[j].l < bars[i].l) isLow = false;
        }
        if (isHigh) swings.push({ type: 'high', i, val: bars[i].h });
        if (isLow) swings.push({ type: 'low', i, val: bars[i].l });
      }

      let structure = 'neutral', lastEvent = 'none', lastS = null;
      let highRef = swings.filter(s => s.type === 'high').pop()?.val;
      let lowRef = swings.filter(s => s.type === 'low').pop()?.val;

      for (let i = 0; i < n; i++) {
        const c = bars[i].c;
        if (highRef && c > highRef) {
          const isChoCH = structure === 'bearish';
          structure = 'bullish';
          lastEvent = isChoCH ? 'CHoCH' : 'BOS';
          lastS = i;
          highRef = Math.max(...bars.slice(i).map(b => b.h));
        } else if (lowRef && c < lowRef) {
          const isChoCH = structure === 'bullish';
          structure = 'bearish';
          lastEvent = isChoCH ? 'CHoCH' : 'BOS';
          lastS = i;
          lowRef = Math.min(...bars.slice(i).map(b => b.l));
        }
      }

      const fvgs = [];
      for (let i = 1; i < n - 1; i++) {
        if (bars[i - 1].h < bars[i + 1].l) fvgs.push({ type: 'bull', top: bars[i + 1].l, bot: bars[i - 1].h });
        if (bars[i - 1].l > bars[i + 1].h) fvgs.push({ type: 'bear', top: bars[i - 1].l, bot: bars[i + 1].h });
      }

      const obs = [];
      if (lastS !== null) {
        const start = Math.max(0, lastS - 5);
        for (let i = start; i < lastS; i++) {

            obs.push({ type: 'bull', top: bars[i].h, bot: bars[i].l });
            break;
          }
          if (structure === 'bearish' && bars[i].c > bars[i].o) {
            obs.push({ type: 'bear', top: bars[i].h, bot: bars[i].l });
            break;

      let poi = 'none';

          breakdown.ob = 3;
          poiBounds = { top: obMatch.top, bot: obMatch.bot };
        } else {

            poi = 'Bullish FVG';
            breakdown.fvg = 1;
            poiBounds = { top: fvgMatch.top, bot: fvgMatch.bot };

          breakdown.ob = -3;
          poiBounds = { top: obMatch.top, bot: obMatch.bot };

            breakdown.fvg = -1;

    }

          '<span>L: $' + r.dayLow.toFixed(2) + '</span>' +
          '<span>V: ' + fmtE(r.dayVol) + '</span>' +
          '</div>' +
          (r.smc15m.actionReasoning ? '<div style="opacity:0.9; line-height:1.5">' + r.smc15m.actionReasoning + '</div>' : '') +
          '</div>' : '') +
        '<div class="sig ' + r.sigClass + '" id="sig-card">' +
        '<div style="font-size:11px;font-weight:500;opacity:.65;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">Signal</div>' +
        '<div class="sv">' + r.signal + '</div>' +
        '</div>' +
        '<div class="card" style="margin-bottom:1.25rem">' +
        '<div class="s-title">Execution Gates Checklist</div>' +
        '<div class="g3" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr))">' +
        [
          'Market Regime', 'Market Breadth', 'SMC Structure', 'EFI/OBV', 'POI Prox', 'Risk/Reward'
        ].map((name, i) => {
          const res = r.gates[i];
          return '<div style="display:flex;flex-direction:column;align-items:center;gap:4px">' +
            '<span style="font-size:10px;color:#64748b;text-transform:uppercase;font-weight:600">' + name + '</span>' +
            b(res, res === 'PASS' ? 'bg' : res === 'CAUTION' ? 'bw' : 'br') +
            '</div>';
        }).join('') +
        '</div>' +
        '</div>' +
        '<div class="dashboard-grid">' +
        '<div class="col-left">' +
        // Step 0 - Macro Gate Card
        '<div class="card" id="card-step0">' +
        '<div class="s-title">S&middot; Macro Analysis</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">' +
        b(r.vixOk ? 'VIX Stable' : 'VIX Elevated', r.vixOk ? 'bg' : 'bw') +
        '</div>' +
        '<div class="g3">' +
        '<div><div class="lbl">SPY vs EMA(21)</div><div class="val">' + (r.spyPrice != null ? r.spyPrice.toFixed(2) : '--') + ' ' + b(r.spyAbove === true ? 'above' : 'below', r.spyAbove === true ? 'bg' : 'br') + '</div></div>' +
        '<div><div class="lbl">QQQ vs EMA(21)</div><div class="val">' + (r.qqqPrice != null ? r.qqqPrice.toFixed(2) : '--') + ' ' + b(r.qqqAbove === true ? 'above' : 'below', r.qqqAbove === true ? 'bg' : 'br') + '</div></div>' +
        '<div><div class="lbl">VIX</div><div class="val">' + (r.vix != null ? r.vix.toFixed(2) : '--') + ' ' + b(r.vix != null ? (r.vix < 25 ? 'normal' : 'elevated') : '--', r.vix != null ? (r.vix < 25 ? 'bg' : 'bw') : 'bn') + '</div></div>' +
        '</div>' +
        (r.breadthChecks ? '<div style="margin-top:12px; padding-top:12px; border-top:1px solid #f1f5f9">' +
          '<div class="lbl" style="margin-bottom:6px">Market Breadth (EMA55)</div>' +
          '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
          r.breadthChecks.map(c => b(c.name, c.pass ? 'bg' : 'br')).join('') +
          '</div>' +
          '</div>' : '') +
        '</div>' +

        // Step 3 - Alpha Score Card
        '<div class="card" id="card-step3">' +
        '<div class="s-title">3 &middot; Confluence</div>' +
        '<div class="frow"><span style="font-size:13px;color:#475569;min-width:110px">RSI(8)</span><span style="font-size:11px;color:#64748b;flex:1;text-align:right;padding-right:10px">' + r.f3r + '</span>' + fb(r.f3) + '</div>' +
        '<div class="frow"><span style="font-size:13px;color:#475569;min-width:110px">EFI Momentum</span><span style="font-size:11px;color:#64748b;flex:1;text-align:right;padding-right:10px">' + r.f4r + '</span>' + fb(r.f4) + '</div>' +
        '<div class="frow"><span style="font-size:13px;color:#475569;min-width:110px">Vol Confirm</span><span style="font-size:11px;color:#64748b;flex:1;text-align:right;padding-right:10px">' + r.f5r + '</span>' + fb(r.f5) + '</div>' +
        '<div class="frow"><span style="font-size:13px;color:#475569;min-width:110px">SMC Structure</span><span style="font-size:11px;color:#64748b;flex:1;text-align:right;padding-right:10px">' + (r.smc.structure === 'bullish' ? 'Bullish' : r.smc.structure === 'bearish' ? 'Bearish' : 'Neutral') + '</span>' + sb(r.smc.breakdown.structure, 1) + '</div>' +
        '<div class="frow"><span style="font-size:13px;color:#475569;min-width:110px">SMC Order Block</span><span style="font-size:11px;color:#64748b;flex:1;text-align:right;padding-right:10px">' + (r.smc.poi.includes('OB') ? r.smc.poi : 'None') + '</span>' + sb(r.smc.breakdown.ob, 3) + '</div>' +
        '<div class="frow"><span style="font-size:13px;color:#475569;min-width:110px">SMC FVG</span><span style="font-size:11px;color:#64748b;flex:1;text-align:right;padding-right:10px">' + (r.smc.breakdown.fvg !== 0 ? (r.smc.breakdown.fvg > 0 ? 'Bullish' : 'Bearish') : 'None') + '</span>' + sb(r.smc.breakdown.fvg, 1) + '</div>' +
        '</div>' +
        (r.smc15m ?
          '<div class="card" id="card-step8">' +
          '<div class="s-title">Step 8 &middot; 15M SMC Confluence</div>' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">' +
          b(r.smc15m.action, r.smc15m.actionClass === 'sig-long' ? 'bg' : r.smc15m.actionClass === 'sig-short' ? 'br' : 'bn') +
          b(r.smc15m.biasText, r.smc15m.isBullishBias ? 'bg' : 'br') +
          b(r.smc15m.haText, r.smc15m.isHaGreen ? 'bg' : 'br') +
          '</div>' +
          '<div style="font-size:12px;color:#64748b;line-height:1.5;margin-bottom:12px">' + r.smc15m.actionReasoning + '</div>' +
          '<div class="g3">' +
          '<div><div class="lbl">OB Entry Price</div><div class="val" style="font-weight:600">$' + r.smc15m.entryPrice.toFixed(2) + '</div></div>' +
          '<div><div class="lbl">Invalidation (SL)</div><div class="val" style="font-weight:600">$' + r.smc15m.slPrice.toFixed(2) + '</div></div>' +
          '<div><div class="lbl">FVG Imbalance</div><div class="val" style="font-size:11px">' + r.smc15m.fvgPrice + '</div></div>' +
          '</div>' +
          '</div>' : '') +
        '</div>' +

        '<div class="col-right">' +
        // Step 1 - Regime Card
        '<div class="card" id="card-step1">' +
        '<div class="s-title">1 &middot; Regime</div>' +
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">' + b(r.regime, regC) + '<span style="font-size:12px;color:#64748b">' + r.regAct + '</span></div>' +
        '<div class="g3">' +
        '<div><div class="lbl">ADX(13)</div><div class="val">' + fmt(r.curAr, 1) + '</div></div>' +
        '<div><div class="lbl">BBW(21)</div><div class="val">' + fmt(r.curBBW, 4) + ' <span style="font-size:11px;color:#64748b">' + r.bbwState + '</span></div></div>' +
        '<div><div class="lbl">Vol Analysis</div><div class="val">' + r.volAnalysis + '</div></div>' +
        '</div>' +
        '</div>' +

        // Step 2 - Toxic Flow Check Card
        '<div class="card" id="card-step2">' +
        '<div class="s-title">2 &middot; Toxic flow check (EFI)</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">' + b(r.flow, flowC) + (r.flowMixed ? b('MIXED &mdash; 1H contradicts daily', 'bw') : '') + '</div>' +
        '<div class="g3">' +
        '<div><div class="lbl">EFI(13) current</div><div class="val mono">' + fmtE(r.curEFI) + '</div></div>' +
        '<div><div class="lbl">55D mean</div><div class="val mono">' + fmtE(r.curMu) + '</div></div>' +
        '<div><div class="lbl">&plusmn;2&sigma; width</div><div class="val mono">' + sigW + '</div></div>' +
        '</div>' +
        '</div>' +

        // Step 4 - Adverse Selection Card
        '<div class="small-cards-grid" id="grid-steps-4-7">' +
        '<div class="card" id="card-step4">' +
        '<div class="s-title">4 &middot; Adverse selection</div>' +
        '<div style="margin-bottom:8px">' + b(r.infFlow ? 'Informed flow &mdash; reduce size' : 'None detected', infC) + '</div>' +
        '<div class="g2">' +
        '<div><div class="lbl">HA body ratio</div><div class="val">' + r.haBody + ' <span style="font-size:11px;color:#64748b">/ 0.618</span></div></div>' +
        '<div><div class="lbl">ATR(5)</div><div class="val">' + fmt(r.a5) + '</div></div>' +
        '</div>' +
        '</div>' +

        '<div class="card" id="card-step5">' +
        '<div class="s-title">5 &middot; Volatility state</div>' +
        '<div class="g2">' +
        '<div><div class="lbl">BBW state</div><div class="val">' + r.bbwState + '</div></div>' +
        '<div><div class="lbl">ATR(13)</div><div class="val">' + fmt(r.a13) + '</div></div>' +
        '</div>' +
        '<div style="margin-top:10px;font-size:12px;color:#64748b;font-style:italic">Switch to static ATR at day 8 of hold</div>' +
        '</div>' +

        '<div class="card" id="card-step6">' +
        '<div class="s-title">6 &middot; Position size</div>' +
        '<div class="sz-box">Size = (Account &times; 0.01) &divide; ' + fmt(r.a13) + ' &times; ' + r.regMult + '<br><span style="font-size:11px;color:#64748b">Kelly &gamma; 0.382 &middot; regime multiplier ' + r.regMult + '</span></div>' +
        '</div>' +

        '<div class="card" id="card-step7">' +
        '<div class="s-title">7 &middot; 1H entry timing</div>' +
        '<div style="margin-bottom:8px">' + b(entTxt, entC) + '</div>' +
        '<div class="g2">' +
        '<div><div class="lbl">1H HA color</div><div class="val">' + r.hHA + '</div></div>' +
        '<div><div class="lbl">1H RSI(8)</div><div class="val">' + (r.hRSI != null ? r.hRSI.toFixed(1) : 'n/a') + '</div></div>' +
        '<div><div class="lbl">1H OBV slope</div><div class="val">' + r.hOBV + '</div></div>' +
        '<div><div class="lbl">1H EFI direction</div><div class="val">' + r.hEFIDir + '</div></div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>';
    }
    let retryTimer = null;
    function clearRetry() { if (retryTimer) { clearInterval(retryTimer); retryTimer = null; } }
    function startRetryCountdown(tk, secs) {
      var res = document.getElementById('res');
      var t = secs;
      res.innerHTML = '<div id="retry-box" style="font-size:13px;padding:.75rem 0;color:#5f5e5a">Rate limited — auto-retrying in <span id="cd">' + t + '</span>s... <button onclick="clearRetry();run()" style="margin-left:8px;font-size:12px;padding:4px 10px">Retry now</button></div>';
      retryTimer = setInterval(function () {
        t--; var el = document.getElementById('cd');
        if (el) el.textContent = t;
        if (t <= 0) { clearRetry(); run(); }
      }, 1000);
    }
    async function run() {
      clearRetry();
      var tk = document.getElementById('tk').value.trim().toUpperCase();
      if (!tk) return;
      var st = document.getElementById('st'), res = document.getElementById('res'), btn = document.getElementById('btn');
      res.innerHTML = ''; btn.disabled = true;
      try {
        st.textContent = 'Fetching daily data...';
        var daily = await fetchBars(tk, '1d', '6mo', st);
        if (daily.length < 60) throw new Error('Not enough history (need 60+ days)');
        st.textContent = 'Fetching 1-hour data...';
        var hourly = null;
        try { hourly = await fetchBars(tk, '1h', '5d', null); } catch (e) { }
        st.textContent = 'Fetching 15-minute data...';
        var min15 = null;
        try { min15 = await fetchBars(tk, '15m', '1d', null); } catch (e) { }
        st.textContent = 'Calculating indicators...';
        var macro = await fetchMacro(null);
        var r = analyze(daily, hourly, tk, macro, min15);
        var now = new Date().toLocaleTimeString();
        st.textContent = tk + ' · ' + r.date + ' · ' + daily.length + ' bars · last updated ' + now;
        render(r);
      } catch (e) {
        st.textContent = '';
        if (e.message.indexOf('All sources failed') >= 0 || e.message.indexOf('Non-JSON') >= 0 || e.message.indexOf('Too Many') >= 0 || e.message.indexOf('Twelve Data') >= 0) {
          startRetryCountdown(tk, 30);
        } else {
          res.innerHTML = '<div style="color:#a32d2d;font-size:13px;padding:.5rem 0">Error: ' + e.message + '</div>';
        }
      } finally { btn.disabled = false; }
    }
    document.getElementById('tk').addEventListener('keydown', function (e) { if (e.key === 'Enter') run(); });
  </script>

  <div id="timer-bar"
    style="display:none;position:sticky;bottom:0;border-top:1px solid #e8e6df;padding:10px 0;text-align:center;font-size:12px">
    Auto-refresh in <span id="timer-cd" style="font-weight:500;font-family:monospace">5:00</span>
    &nbsp;<button onclick="resetTimer();run()" style="font-size:11px;padding:3px 10px">Refresh now</button>
    &nbsp;<button onclick="stopTimer()" style="font-size:11px;padding:3px 10px">Stop</button>
  </div>
  <script>
    let _ti = null, _ts = 300;
    function stopTimer() { clearInterval(_ti); _ti = null; document.getElementById('timer-bar').style.display = 'none'; }
    function resetTimer() {
      clearInterval(_ti); _ts = 300;
      document.getElementById('timer-bar').style.display = 'block';
      _ti = setInterval(() => {
        _ts--;
        const m = Math.floor(_ts / 60), s = _ts % 60;
        const el = document.getElementById('timer-cd');
        if (el) el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
        if (_ts <= 0) { _ts = 300; run(); }
      }, 1000);
    }
    const _origRun = run;
    window.run = async function () {
      await _origRun.apply(this, arguments);
      const tk = document.getElementById('tk').value.trim();
      if (tk && !_ti) resetTimer();
      else if (tk && _ti) { _ts = 300; }
    };
  </script>
</body>

</html>
