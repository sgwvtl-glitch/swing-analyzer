<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波段量化分析系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0f1117;
  --bg2:    #161c27;
  --bg3:    #1c2435;
  --bdr:    #2a3348;
  --bdr2:   #374260;
  --tx:     #c8d6e8;
  --tx2:    #f0f6ff;
  --tx3:    #7d90a8;
  --tx4:    #4a5a70;
  --green:  #34d985;
  --green2: rgba(52,217,133,.13);
  --green3: rgba(52,217,133,.06);
  --red:    #f25c6e;
  --red2:   rgba(242,92,110,.13);
  --yellow: #f0bc2e;
  --yellow2:rgba(240,188,46,.12);
  --blue:   #5b9cf6;
  --blue2:  rgba(91,156,246,.13);
  --purple: #a78bfa;
  --purple2:rgba(167,139,250,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.6;min-height:100vh}

/* HEADER */
.hdr{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:18px;font-weight:700;color:var(--tx2);letter-spacing:.3px}
.hdr-title span{color:var(--green)}
.hdr-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.hdr-ver{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);background:var(--blue2);border:1px solid rgba(91,156,246,.3);padding:4px 12px;border-radius:4px}

/* INPUT BAR */
.inbar{display:flex;gap:12px;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--bdr);align-items:flex-end;flex-wrap:wrap}
.inp-grp{display:flex;flex-direction:column;gap:4px}
.inp-lbl{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:1px;text-transform:uppercase}
input[type=text]{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);padding:7px 12px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;outline:none;border-radius:5px;transition:border-color .2s,box-shadow .2s}
input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(91,156,246,.15)}
input[type=text]::placeholder{color:var(--tx4)}
#sym{width:110px;text-transform:uppercase}
.btn{background:var(--green);border:none;color:#0a1a0f;padding:8px 26px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border-radius:5px;transition:background .2s,transform .1s}
.btn:hover{background:#3de892}
.btn:active{transform:scale(.97)}
.btn:disabled{background:var(--tx4);color:var(--bg);cursor:not-allowed;transform:none}
.cs{font-size:11px;color:var(--tx4);padding-bottom:3px}
.cs.live{color:var(--green)}

/* STATUS BAR */
.sbar{display:flex;gap:20px;padding:7px 24px;background:rgba(0,0,0,.18);border-bottom:1px solid var(--bdr);font-size:11px;color:var(--tx3);flex-wrap:wrap;align-items:center}
.si{display:flex;gap:6px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--tx4);transition:all .3s;flex-shrink:0}
.dot.ok{background:var(--green);box-shadow:0 0 7px var(--green)}
.dot.err{background:var(--red)}
.dot.working{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
#main{padding:16px 24px}
.loading{display:none;padding:48px;text-align:center;color:var(--blue);font-size:14px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.bk{animation:blink 1.2s infinite}
.report{display:none}
.err-msg{color:var(--red);padding:14px 18px;background:var(--red2);border:1px solid rgba(242,92,110,.3);border-radius:6px;font-size:13px;line-height:1.9;margin-top:14px}

/* PANELS */
.panel{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px}
.ph{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);padding-bottom:9px;border-bottom:1px solid var(--bdr);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center}
.tf-badge{font-size:10px;padding:2px 8px;border:1px solid;border-radius:3px;font-weight:600}
.b1d{color:var(--blue);border-color:rgba(91,156,246,.4);background:var(--blue2)}
.b1h{color:var(--purple);border-color:rgba(167,139,250,.4);background:var(--purple2)}

/* INDICATOR TABLE */
.itbl{width:100%;border-collapse:collapse}
.itbl tr:hover td{background:rgba(255,255,255,.025)}
.itbl td{padding:5.5px 6px;border-bottom:1px solid rgba(42,51,72,.55);vertical-align:middle}
.itbl td:first-child{color:var(--tx3);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;width:72px;white-space:nowrap}
.itbl td:nth-child(2){color:var(--tx2);font-family:'JetBrains Mono',monospace;font-size:12px}
.itbl td:last-child{text-align:right;font-size:11px;font-weight:600;white-space:nowrap}

/* SIGNAL COLORS */
.bull{color:var(--green)}
.bear{color:var(--red)}
.warn{color:var(--yellow)}
.neu{color:var(--tx3)}
.blu{color:var(--blue)}
.pur{color:var(--purple)}

/* ANALYSIS GRID */
.agrid{display:grid;grid-template-columns:1fr 295px 1fr;gap:12px;margin-bottom:12px}
@media(max-width:860px){.agrid{grid-template-columns:1fr}}

/* SCORE CENTER */
.scnum{font-family:'JetBrains Mono',monospace;font-size:60px;font-weight:700;line-height:1;text-align:center}
.scdenom{font-size:24px;font-weight:400;color:var(--tx3)}
.sclbl{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;text-align:center;margin-top:4px}
.qscore{font-size:16px;font-weight:700;color:var(--blue);text-align:center;margin-top:4px;font-family:'JetBrains Mono',monospace}
.veto-box{background:var(--red2);border:1px solid rgba(242,92,110,.3);border-radius:6px;padding:9px 12px;margin-bottom:10px}
.veto-box .vt{color:var(--red);font-size:11px;padding:2px 0;font-weight:500}
.veto-clear{color:var(--green);font-size:11px;font-weight:600;border:1px solid rgba(52,217,133,.25);border-radius:6px;padding:7px 10px;margin-bottom:10px;background:var(--green3)}
.sc-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(42,51,72,.5);font-size:11px;gap:8px}
.sc-item-l{color:var(--tx);line-height:1.4}
.sc-pass{color:var(--green);font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.sc-fail{color:var(--tx4);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.rec-action{font-size:17px;font-weight:700;text-align:center;margin-top:12px;line-height:1.3}
.rec-buy{color:var(--green)}
.rec-wait{color:var(--yellow)}
.rec-no{color:var(--red)}
.hbadge{display:block;background:var(--blue2);border:1px solid rgba(91,156,246,.3);color:var(--blue);padding:6px 12px;font-size:12px;font-weight:600;margin-top:8px;text-align:center;border-radius:5px}

/* QUANT GRID */
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:700px){.qgrid{grid-template-columns:1fr 1fr}}
.qm{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px}
.ql{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.qv{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1;margin-bottom:4px}
.qd{font-size:11px;color:var(--tx3)}

/* TRADE PLAN */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:600px){.tgrid{grid-template-columns:1fr}}
.ptbl{width:100%;border-collapse:collapse}
.ptbl tr:hover td{background:rgba(255,255,255,.025)}
.ptbl td{padding:6px 6px;border-bottom:1px solid rgba(42,51,72,.5)}
.ptbl td:first-child{color:var(--tx3);font-size:11px;font-weight:500;width:58%}
.ptbl td:last-child{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:right}

/* MACRO BAR */
.mbar{display:flex;gap:10px;margin-bottom:12px}
.mitem{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:11px 14px}
.mlbl{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--tx3);text-transform:uppercase}
.mval{font-size:16px;font-weight:700;margin-top:4px}

/* SECTION TITLE */
.stitle{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin:16px 0 9px;border-bottom:1px solid var(--bdr);padding-bottom:5px;display:flex;align-items:center;gap:8px}
.stitle::before{content:'';display:block;width:3px;height:12px;background:var(--blue);border-radius:2px;flex-shrink:0}

/* ALERTS */
.alert-red{background:var(--red2);border:1px solid rgba(242,92,110,.3);border-radius:6px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--red);line-height:1.8}
.alert-yellow{background:var(--yellow2);border:1px solid rgba(240,188,46,.3);border-radius:6px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--yellow);line-height:1.8}
.alert-blue{background:var(--blue2);border:1px solid rgba(91,156,246,.3);border-radius:6px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--blue);line-height:1.8}

/* SYM HEADER */
.sym-hdr{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.sym-name{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--tx2)}
.sym-price{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--blue)}
.sym-lbl{font-size:10px;color:var(--tx3);font-weight:600;letter-spacing:.5px}

/* ADX BAR */
.adx-track{height:5px;background:var(--bg3);border-radius:3px;margin-top:6px;overflow:hidden}
.adx-fill{height:100%;border-radius:3px;transition:width .6s}

/* MINI CHART */
.mc{width:100%;height:180px;margin-bottom:10px;border-radius:4px;background:var(--bg3);padding:6px;overflow:hidden}

/* BONUS */
.bonus-row{font-size:11px;color:var(--blue);padding:2px 0}

/* FOOTER */
.footer{font-size:10px;color:var(--tx4);text-align:center;padding:14px;border-top:1px solid var(--bdr);margin-top:16px;line-height:1.9}
.ts{font-size:10px;color:var(--tx3);text-align:right;margin-top:12px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">📈 <span>波段量化</span>分析系统</div>
    <div class="hdr-sub">Swing Quant Analyzer · 1–10 Day Strategy · Powered by Twelve Data</div>
  </div>
  <div class="hdr-ver">波段量化分析系统</div>
</div>

<div class="inbar">
  <div class="inp-grp">
    <div class="inp-lbl">股票代码</div>
    <input type="text" id="sym" placeholder="AAPL" maxlength="10">
  </div>
  <button class="btn" id="abtn" onclick="startAnalysis()">▶ 分析</button>
  <div class="cs" id="cs">— 未缓存</div>
</div>

<div class="sbar">
  <div class="si"><div class="dot" id="d1d"></div><span id="s1d">1D 日线</span></div>
  <div class="si"><div class="dot" id="d1h"></div><span id="s1h">1H 小时</span></div>
  <div class="si"><div class="dot" id="dsm"></div><span id="ssm">SPY / QQQ</span></div>
  <div class="si"><div class="dot" id="dca"></div><span id="sca">指标计算</span></div>
  <div class="si" style="margin-left:auto;gap:10px;align-items:center">
    <span style="font-size:10px;color:var(--tx4)">4 并行调用 · 30 分钟缓存</span>
    <span id="refresh-badge" style="display:none;font-size:11px;font-weight:600;color:var(--yellow);background:rgba(240,188,46,.1);border:1px solid rgba(240,188,46,.3);padding:2px 10px;border-radius:4px">⟳ <span id="countdown">120</span>s 后刷新</span>
  </div>
</div>

<div id="main">
  <div class="loading" id="loading"><span class="bk">正在并行拉取数据并计算指标…</span></div>
  <div class="report" id="report"></div>
  <div id="errbox"></div>
</div>

<script>
/* ══════════════════════════════════════════
   ★ API KEY — hardcoded
══════════════════════════════════════════ */
const API_KEY = '934f233f1c934c92a767bb9e52191d6d';

/* ══════════════════════════════════════════
   INDICATOR MATH
══════════════════════════════════════════ */
const parseOHLCV = d => {
  if (!d?.values?.length) return null;
  return [...d.values].reverse().map(v=>({
    dt:v.datetime, o:+v.open, h:+v.high, l:+v.low, c:+v.close, vol:+(v.volume||0)
  }));
};

const computeHA = bars => {
  const ha=[];
  for(let i=0;i<bars.length;i++){
    const b=bars[i], hc=(b.o+b.h+b.l+b.c)/4;
    const ho=i===0?(b.o+b.c)/2:(ha[i-1].o+ha[i-1].c)/2;
    ha.push({dt:b.dt,o:ho,h:Math.max(b.h,ho,hc),l:Math.min(b.l,ho,hc),c:hc,vol:b.vol});
  }
  return ha;
};

const computeEMA = (vals, p) => {
  const k=2/(p+1), out=new Array(vals.length).fill(null);
  if(vals.length<p) return out;
  let s=0; for(let i=0;i<p;i++) s+=vals[i]; out[p-1]=s/p;
  for(let i=p;i<vals.length;i++) out[i]=vals[i]*k+out[i-1]*(1-k);
  return out;
};

const computeRSI = (closes, p) => {
  const out=new Array(closes.length).fill(null);
  if(closes.length<p+1) return out;
  let ag=0, al=0;
  for(let i=1;i<=p;i++){const d=closes[i]-closes[i-1];if(d>0)ag+=d;else al+=-d;}
  ag/=p; al/=p;
  out[p]=100-100/(1+ag/(al||1e-10));
  for(let i=p+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1], g=d>0?d:0, l=d<0?-d:0;
    ag=(ag*(p-1)+g)/p; al=(al*(p-1)+l)/p;
    out[i]=100-100/(1+ag/(al||1e-10));
  }
  return out;
};

const computeOBV = bars => {
  const obv=[0];
  for(let i=1;i<bars.length;i++){
    const d=bars[i].c-bars[i-1].c;
    obv.push(d>0?obv[i-1]+bars[i].vol:d<0?obv[i-1]-bars[i].vol:obv[i-1]);
  }
  return obv;
};

const computeATR = (bars, p=14) => {
  const tr=[bars[0].h-bars[0].l];
  for(let i=1;i<bars.length;i++){
    const {h,l}=bars[i], pc=bars[i-1].c;
    tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  const out=new Array(bars.length).fill(null);
  if(bars.length<p) return out;
  let s=0; for(let i=0;i<p;i++) s+=tr[i]; out[p-1]=s/p;
  for(let i=p;i<bars.length;i++) out[i]=(out[i-1]*(p-1)+tr[i])/p;
  return out;
};

const computeADX = (bars, p=14) => {
  const n=bars.length;
  if(n<p*2) return {adx:null,pdi:null,mdi:null};
  const tr=[],pdm=[],mdm=[];
  tr.push(bars[0].h-bars[0].l); pdm.push(0); mdm.push(0);
  for(let i=1;i<n;i++){
    const H=bars[i].h,L=bars[i].l,pH=bars[i-1].h,pL=bars[i-1].l,pC=bars[i-1].c;
    tr.push(Math.max(H-L,Math.abs(H-pC),Math.abs(L-pC)));
    const u=H-pH,d=pL-L;
    pdm.push(u>d&&u>0?u:0); mdm.push(d>u&&d>0?d:0);
  }
  let sTR=tr.slice(0,p).reduce((a,b)=>a+b,0);
  let sPDM=pdm.slice(0,p).reduce((a,b)=>a+b,0);
  let sMDM=mdm.slice(0,p).reduce((a,b)=>a+b,0);
  const dxs=[];
  for(let i=p;i<n;i++){
    sTR=sTR-sTR/p+tr[i]; sPDM=sPDM-sPDM/p+pdm[i]; sMDM=sMDM-sMDM/p+mdm[i];
    const pdi=100*sPDM/(sTR||1), mdi=100*sMDM/(sTR||1);
    dxs.push({dx:100*Math.abs(pdi-mdi)/((pdi+mdi)||1),pdi,mdi});
  }
  if(dxs.length<p) return {adx:null,pdi:null,mdi:null};
  let adx=dxs.slice(0,p).reduce((a,b)=>a+b.dx,0)/p;
  let lpdi=dxs[p-1].pdi, lmdi=dxs[p-1].mdi;
  for(let j=p;j<dxs.length;j++){adx=(adx*(p-1)+dxs[j].dx)/p; lpdi=dxs[j].pdi; lmdi=dxs[j].mdi;}
  return {adx,pdi:lpdi,mdi:lmdi};
};

const computeBB = (closes, p=20) => {
  const n=closes.length;
  if(n<p) return {upper:null,middle:null,lower:null,pctB:null,width:null};
  const sl=closes.slice(n-p);
  const mean=sl.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/p);
  const up=mean+2*std, lo=mean-2*std, last=closes[n-1];
  return {upper:up,middle:mean,lower:lo,pctB:(last-lo)/((up-lo)||1),width:(up-lo)/(mean||1)};
};

const computeTD9 = bars => {
  let bc=0,sc=0,lastSig=null; const states=[];
  for(let i=4;i<bars.length;i++){
    const c=bars[i].c, c4=bars[i-4].c;
    if(c<c4){sc=0;bc++;if(bc===9)lastSig={type:'BUY_9',i};}
    else if(c>c4){bc=0;sc++;if(sc===9)lastSig={type:'SELL_9',i};}
    else{bc=0;sc=0;}
    if(i>=bars.length-3) states.push({bc,sc,i});
  }
  const last=states[states.length-1]||{bc:0,sc:0};
  return {bc:last.bc,sc:last.sc,lastSig};
};

const volMA = (bars, p=20) => {
  const n=bars.length; if(n<p) return null;
  return bars.slice(n-p).reduce((a,b)=>a+b.vol,0)/p;
};

const momZ = (closes, mp=10, zp=20) => {
  const n=closes.length; if(n<mp+zp) return null;
  const moms=[];
  for(let i=mp;i<n;i++) moms.push(closes[i]-closes[i-mp]);
  if(moms.length<zp) return null;
  const sl=moms.slice(-zp);
  const mean=sl.reduce((a,b)=>a+b,0)/zp;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/zp);
  return std>0?(moms[moms.length-1]-mean)/std:0;
};

const classifyHA = ha => {
  const {o,h,l,c}=ha, bull=c>=o, body=Math.abs(c-o)||0.0001;
  const uSh=bull?h-c:h-o, lSh=bull?o-l:c-l, thr=body*.15;
  const uH=uSh>thr, lH=lSh>thr;
  if(bull){
    if(!uH&&!lH) return {cn:'强势多头',en:'Strong Bull',col:'green',str:4};
    if(!uH&&lH)  return {cn:'多头',en:'Bull',col:'green',str:3};
    if(uH&&!lH)  return {cn:'多头趋弱',en:'Bull Weakening',col:'green',str:2};
    return {cn:'震荡',en:'Indecision',col:'green',str:1};
  } else {
    if(!uH&&!lH) return {cn:'强势空头',en:'Strong Bear',col:'red',str:-4};
    if(uH&&!lH)  return {cn:'空头',en:'Bear',col:'red',str:-3};
    if(!uH&&lH)  return {cn:'空头趋弱',en:'Bear Weakening',col:'red',str:-2};
    return {cn:'震荡',en:'Indecision',col:'red',str:-1};
  }
};

const obvTrend = obv => {
  const n=obv.length; if(n<4) return 'flat';
  const sl=obv.slice(n-4); let up=0,dn=0;
  for(let i=1;i<sl.length;i++){if(sl[i]>sl[i-1])up++;else if(sl[i]<sl[i-1])dn++;}
  if(dn>=3) return 'fall3';
  if(dn>=2&&up===0) return 'falling';
  if(up>=2&&dn===0) return 'rising';
  return 'flat';
};

const obvVShape = obv => {
  const sl=obv.slice(-6); if(sl.length<6) return false;
  const mid=Math.floor(sl.length/2);
  return sl[0]>sl[mid]&&sl[mid]<sl[sl.length-1];
};

const rsiDiv = (closes, rsiArr, lb=5) => {
  const n=closes.length-1;
  if(!rsiArr[n]||!rsiArr[n-lb]) return {bear:false,bull:false};
  const pc=closes[n]-closes[n-lb], rrc=rsiArr[n]-rsiArr[n-lb];
  return {bear:pc>0.5&&rrc<-3, bull:pc<-0.5&&rrc>3};
};

const emaSlope = emaArr => {
  const n=emaArr.length-1;
  if(!emaArr[n]||!emaArr[n-3]) return 'flat';
  return emaArr[n]>emaArr[n-3]?'rising':emaArr[n]<emaArr[n-3]?'falling':'flat';
};

/* ══════════════════════════════════════════
   ANALYSIS ENGINE
══════════════════════════════════════════ */
const analyze = (b1D, b1H, bSpy, bQqq) => {
  if(!b1D||!b1H) return null;
  const h1D=computeHA(b1D), h1H=computeHA(b1H);
  const c1D=b1D.map(b=>b.c), c1H=b1H.map(b=>b.c);
  const n=b1D.length-1, m=b1H.length-1;

  const e8d=computeEMA(c1D,8), e8h=computeEMA(c1H,8);
  const r5d=computeRSI(c1D,5), r13d=computeRSI(c1D,13), r34d=computeRSI(c1D,34);
  const r5h=computeRSI(c1H,5), r13h=computeRSI(c1H,13), r34h=computeRSI(c1H,34);
  const obv1D=computeOBV(b1D), obv1H=computeOBV(b1H);
  const atr1D=computeATR(b1D,14), adx1D=computeADX(b1D,14), bb1D=computeBB(c1D,20);
  const td9d=computeTD9(b1D), td9h=computeTD9(b1H);
  const vm1D=volMA(b1D), vm1H=volMA(b1H), mz1D=momZ(c1D);

  const ha1D=classifyHA(h1D[n]), ha1H=classifyHA(h1H[m]);
  const spyHA=bSpy?.length?classifyHA(computeHA(bSpy).slice(-1)[0]):null;
  const qqqHA=bQqq?.length?classifyHA(computeHA(bQqq).slice(-1)[0]):null;

  const price=b1D[n].c;
  const ed1D=e8d[n]?((price-e8d[n])/e8d[n]*100):null;
  const ed1H=e8h[m]?((c1H[m]-e8h[m])/e8h[m]*100):null;

  const otr1D=obvTrend(obv1D), otr1H=obvTrend(obv1H), ovsh1H=obvVShape(obv1H);
  const div1D=rsiDiv(c1D,r13d), div1H=rsiDiv(c1H,r13h);
  const es1D=emaSlope(e8d), es1H=emaSlope(e8h);
  const pobvDiv1D=n>=5?(c1D[n]>c1D[n-5]&&obv1D[n]<obv1D[n-5]):false;
  const rsiAl1D=(r5d[n]>r13d[n]&&r13d[n]>r34d[n])?'bull':(r5d[n]<r13d[n]&&r13d[n]<r34d[n])?'bear':'mixed';
  const rsiAl1H=(r5h[m]>r13h[m]&&r13h[m]>r34h[m])?'bull':(r5h[m]<r13h[m]&&r13h[m]<r34h[m])?'bear':'mixed';
  const r13hRising=r13h[m]&&r13h[m-3]?r13h[m]>r13h[m-3]:false;
  const vvm1D=vm1D?b1D[n].vol/vm1D:null, vvm1H=vm1H?b1H[m].vol/vm1H:null;

  return {
    price, dt1D:b1D[n].dt,
    ha1D, ha1H, spyHA, qqqHA,
    e8d:e8d[n], e8h:e8h[m], ed1D, ed1H, es1D, es1H,
    r5d:r5d[n], r13d:r13d[n], r34d:r34d[n],
    r5h:r5h[m], r13h:r13h[m], r34h:r34h[m], r13hRising,
    rsiAl1D, rsiAl1H, div1D, div1H,
    obv1D:obv1D[n], obv1H:obv1H[m], otr1D, otr1H, ovsh1H, pobvDiv1D,
    obvCDrop:otr1D==='fall3', vvm1D, vvm1H, td9d, td9h,
    atr1D:atr1D[n], adx1D, bb1D, mz1D,
    ha1DArr:h1D.slice(-20), ha1HArr:h1H.slice(-20)
  };
};

/* ══════════════════════════════════════════
   V6.1 SCORING ENGINE
══════════════════════════════════════════ */
const scoreV61 = a => {
  const veto=[], items=[]; let score=0;

  if((a.r5h||0)>75)                               veto.push('RSI(5) 1H > 75');
  if(a.ha1D.col==='red')                           veto.push('1D HA 当日确认为红色');
  if(a.ha1D.col!==a.ha1H.col)                      veto.push('1D 与 1H 趋势方向冲突');
  if(a.td9d.lastSig?.type==='SELL_9')              veto.push('1D TD9 SELL-9 已确认');
  if(a.spyHA?.col==='red'&&a.qqqHA?.col==='red')   veto.push('SPY + QQQ 同为红色 — 宏观一票否决');

  const add=(lbl,pass,pts)=>{items.push({lbl,pass,pts});if(pass)score+=pts;};
  add('1D HA 绿色确认',          a.ha1D.col==='green',                                  2);
  add('1D/1H 趋势一致',           a.ha1D.col===a.ha1H.col,                               2);
  add('1D OBV 上升，无背离',      a.otr1D==='rising'&&!a.pobvDiv1D,                      1);
  add('RSI(5) 1H < 75',          (a.r5h||0)<75,                                         1);
  add('RSI(5) 1H 在 45–65',      (a.r5h||0)>=45&&(a.r5h||0)<=65,                       1);
  add('RSI(13) 1H 50–65 且上升', (a.r13h||0)>=50&&(a.r13h||0)<=65&&a.r13hRising,       1);
  add('价格在 1H EMA(8) 上方',   (a.ed1H||0)>0,                                         1);
  add('入场量 ≥ 1H MA20',        (a.vvm1H||0)>=1.0,                                     1);

  const bonus=[];
  if(a.td9d.bc===9||a.td9d.lastSig?.type==='BUY_9') bonus.push('1D TD9 底部 Buy-9 确认');
  if(a.ovsh1H)           bonus.push('1H OBV V 形恢复');
  if(a.ha1D.str===4)     bonus.push('1D HA 绿色无上影线（强势实体）');
  if(a.rsiAl1D==='bull') bonus.push('RSI 三线多头排列 (1D)');
  if((a.r34d||0)>50)     bonus.push('1D RSI(34) > 50 — 中期偏多');
  if(!a.div1D.bear)      bonus.push('RSI(13) 无看跌背离 (1D)');
  if(a.spyHA?.col==='green'&&a.qqqHA?.col==='green') bonus.push('宏观背景确认 (SPY+QQQ 同绿)');

  let thr=6, maxPos='full';
  if(a.obvCDrop){thr=9;maxPos='half';}
  else if(a.spyHA&&a.qqqHA&&a.spyHA.col!==a.qqqHA.col) thr=8;

  let rec, recCls;
  if(veto.length>0){rec='不入场 — 一票否决';recCls='no';}
  else if(score>=9){rec=maxPos==='full'?'全仓入场':'半仓入场（OBV 限制）';recCls='buy';}
  else if(score>=7){rec='半仓试探性入场';recCls='buy';}
  else if(score===6){rec='四分之一仓，严格止损';recCls='wait';}
  else{rec='等待 — 信号不足';recCls='wait';}

  return {veto,items,score,bonus,rec,recCls,thr,maxPos};
};

   QUANT LAYER
══════════════════════════════════════════ */
const scoreQuant = a => {
  let qs=0; const items=[];
  const av=a.adx1D.adx, ap=av>=30?2:av>=25?1:0; qs+=ap;
  items.push({lbl:'ADX(14) 趋势强度',val:av?av.toFixed(1):'N/A',pts:ap,max:2,
    detail:av?av>=30?'强势趋势':av>=25?'趋势发展中':av>=20?'弱趋势':'震荡市':'N/A'});

  const bb=a.bb1D.pctB, bp=bb!==null&&bb<0.5?1:0; qs+=bp;
  items.push({lbl:'BB %B 价格位置',val:bb!==null?(bb*100).toFixed(0)+'%B':'N/A',pts:bp,max:1,
    detail:bb!==null?bb<0.3?'近下轨，弹升空间大':bb<0.5?'下半区，有空间':'上半区，注意追高':'N/A'});

  const mz=a.mz1D, mp=mz!==null?mz>=1?2:mz>=0.5?1:0:0; qs+=mp;
  items.push({lbl:'动量 Z-Score',val:mz!==null?mz.toFixed(2):'N/A',pts:mp,max:2,
    detail:mz!==null?mz>=1?'强上行动量':mz>=0.5?'温和上行动量':mz<0?'动量偏负':'中性':'N/A'});

  const vs=(a.vvm1D||0)>=2.0?1:0; qs+=vs;
  items.push({lbl:'成交量爆发',val:a.vvm1D?(a.vvm1D*100).toFixed(0)+'%':'N/A',pts:vs,max:1,
    detail:a.vvm1D?a.vvm1D>=2?'爆发确认 ≥ 200%':a.vvm1D>=1.2?'放量':'正常量':'N/A'});

  let horizon;
  if(av&&av>=30&&a.ha1D.col==='green') horizon='5–10 日';
  else if(av&&av>=20) horizon='2–5 日';
  else horizon='1–2 日（震荡市）';

  return {qs,items,horizon,adxDir:a.adx1D.pdi>a.adx1D.mdi?'多头方向':'空头方向'};
};

   TRADE PLAN
══════════════════════════════════════════ */
const tradePlan = (a, s) => {
  if(!a.atr1D||!a.price) return null;
  const p=a.price, atr=a.atr1D, s1=p-2*atr, s2=p-1.5*atr, s3=p-atr, R=p-s2;
  return {p,atr,R,s1,s2,s3,t1:p+1.5*R,t2:p+2.5*R,pos:s>=9?100:s>=7?50:s===6?25:0};
};

/* ══════════════════════════════════════════
   MINI CHART
══════════════════════════════════════════ */
const miniChart = haArr => {
  const data=haArr.slice(-20), W=280, H=165, pd=5;
  const prices=data.flatMap(c=>[c.h,c.l]);
  const lo=Math.min(...prices), hi=Math.max(...prices), rng=hi-lo||1;
  const bw=(W-pd*2)/data.length, y=p=>H-pd-((p-lo)/rng)*(H-pd*2);
  let s=`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#2a3348" stroke-width="0.5"/>`;
  data.forEach((c,i)=>{
    const x=pd+i*bw, bx=x+bw*.15, bw2=bw*.7;
    const col=c.c>=c.o?'#34d985':'#f25c6e';
    const oy=y(c.o), cy=y(c.c), hy=y(c.h), ly=y(c.l);
    const top=Math.min(oy,cy), bh=Math.max(Math.abs(cy-oy),1), mid=bx+bw2/2;
    s+=`<line x1="${mid}" y1="${hy}" x2="${mid}" y2="${ly}" stroke="${col}" stroke-width="0.8" opacity="0.55"/>`;
    s+=`<rect x="${bx}" y="${top}" width="${bw2}" height="${bh}" fill="${col}" opacity="0.88" rx="0.4"/>`;
  });
  return s+'</svg>';
};

  </div>`).join('')}
  <div class="qm">
    <div class="ql">ADX 方向 (1D)</div>
    <div class="qv ${a.adx1D.pdi>a.adx1D.mdi?'bull':'bear'}">${adxDir}</div>
    <div class="qd">+DI ${f(a.adx1D.pdi,1)} · −DI ${f(a.adx1D.mdi,1)}</div>
    <div class="adx-track"><div class="adx-fill" style="width:${Math.min((a.adx1D.adx||0)/50*100,100)}%;background:${(a.adx1D.adx||0)>=30?'var(--green)':(a.adx1D.adx||0)>=20?'var(--yellow)':'var(--red)'}"></div></div>
  </div>
  <div class="qm">
    <div class="ql">BB 宽度 (1D)</div>
    <div class="qv blu">${a.bb1D.width!==null?(a.bb1D.width*100).toFixed(2)+'%':'—'}</div>
    <div class="qd">上 ${f(a.bb1D.upper)} · 中 ${f(a.bb1D.middle)} · 下 ${f(a.bb1D.lower)}</div>

    <div class="qd">${a.atr1D&&a.price?((a.atr1D/a.price)*100).toFixed(2)+'% 日均振幅':'—'}</div>
  </div>
</div>

${plan?`

${a.obvCDrop?`<div class="alert-red">⚠️ <strong>1D OBV 趋势性下降警告：</strong>连续 3 根以上 K 线 OBV 持续下滑，资金净流出趋势明显。入场门槛自动升至 9 分，仓位上限降为半仓，即使总分 ≥ 9 分。</div>`:''}

/* ══════════════════════════════════════════
   CACHE + FETCH
══════════════════════════════════════════ */
const CACHE_MIN=30;
const cacheKey=sym=>`sqv7_${sym}_${new Date().toISOString().slice(0,13)}`;
const setCache=(k,v)=>{try{sessionStorage.setItem(k,JSON.stringify({v,ts:Date.now()}));}catch(e){}};
const getCache=k=>{try{const r=JSON.parse(sessionStorage.getItem(k));if(!r||Date.now()-r.ts>CACHE_MIN*60000)return null;return r.v;}catch{return null;}};

const setDot=(id,state,txt)=>{
  const d=document.getElementById('d'+id), s=document.getElementById('s'+id);
  if(d) d.className='dot'+(state==='ok'?' ok':state==='err'?' err':state==='work'?' working':'');
  if(s&&txt) s.textContent=txt;
};

const fetchAllData=async (sym, forceRefresh=false)=>{
  const ck=cacheKey(sym), cached=getCache(ck);
  if(cached && !forceRefresh){const cs=document.getElementById('cs');cs.textContent='✓ 使用缓存 (30 分钟内有效)';cs.className='cs live';return cached;}
  const B='https://api.twelvedata.com';
  const [r1d,r1h,rspy,rqqq]=await Promise.all([
    fetch(`${B}/time_series?symbol=${sym}&interval=1day&outputsize=60&apikey=${API_KEY}`).then(r=>{setDot('1d','ok','1D ✓');return r.json();}),
    fetch(`${B}/time_series?symbol=${sym}&interval=1h&outputsize=60&apikey=${API_KEY}`).then(r=>{setDot('1h','ok','1H ✓');return r.json();}),
    fetch(`${B}/time_series?symbol=SPY&interval=1day&outputsize=5&apikey=${API_KEY}`).then(r=>r.json()),
    fetch(`${B}/time_series?symbol=QQQ&interval=1day&outputsize=5&apikey=${API_KEY}`).then(r=>{setDot('sm','ok','SPY/QQQ ✓');return r.json();}),
  ]);
  const result={r1d,r1h,rspy,rqqq};
  setCache(ck,result);
  const cs=document.getElementById('cs');cs.textContent='● 实时数据（缓存 30 分钟）';cs.className='cs live';
  return result;
};

/* ══════════════════════════════════════════
   MAIN ENTRY
══════════════════════════════════════════ */
async function startAnalysis(forceRefresh=false){
  const sym=(document.getElementById('sym').value||'').trim().toUpperCase();
  if(!sym){document.getElementById('errbox').innerHTML='<div class="err-msg">请输入股票代码，例如：AAPL、MSFT、TSLA</div>';return;}
  const btn=document.getElementById('abtn');
  btn.disabled=true; btn.textContent='⏳ 分析中…';
  document.getElementById('loading').style.display='block';
  document.getElementById('report').style.display='none';
  document.getElementById('errbox').innerHTML='';
  ['1d','1h','sm','ca'].forEach(id=>setDot(id,'',''));
  try{
    setDot('1d','work','1D 拉取中…'); setDot('1h','work','1H 拉取中…');
    const {r1d,r1h,rspy,rqqq}=await fetchAllData(sym, forceRefresh);
    if(r1d.status==='error') throw new Error(`日线数据: ${r1d.message}`);
    if(r1h.status==='error') throw new Error(`小时线数据: ${r1h.message}`);
    setDot('ca','work','计算中…');
    const b1D=parseOHLCV(r1d), b1H=parseOHLCV(r1h);
    const bSpy=parseOHLCV(rspy), bQqq=parseOHLCV(rqqq);
    if(!b1D||b1D.length<40) throw new Error('日线数据不足（需 ≥ 40 根 K 线）');
    if(!b1H||b1H.length<30) throw new Error('小时线数据不足（需 ≥ 30 根 K 线）');
    const a=analyze(b1D,b1H,bSpy,bQqq);
    const v61=scoreV61(a);
    const qsc=scoreQuant(a);
    const plan=v61.score>=6&&v61.veto.length===0?tradePlan(a,v61.score):null;
    setDot('ca','ok','计算完成 ✓');
    document.getElementById('report').innerHTML=renderReport(a,v61,qsc,plan,sym);
    document.getElementById('report').style.display='block';
  }catch(err){
    ['1d','1h','sm','ca'].forEach(id=>{const d=document.getElementById('d'+id);if(d&&!d.classList.contains('ok'))d.classList.add('err');});
    document.getElementById('errbox').innerHTML=`<div class="err-msg">❌ ${err.message}<br><br>
      排查建议：<br>
      1. 确认股票代码格式正确（如 AAPL、MSFT、TSLA）<br>
      2. API 配额：免费账户限速 8 次/分钟，稍候再试<br>
      3. ETF 和指数需确认 Twelve Data 支持该代码</div>`;
  }finally{
    document.getElementById('loading').style.display='none';
    btn.disabled=false; btn.textContent='▶ 分析';
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')startAnalysis();});
document.getElementById('sym').addEventListener('input',function(){this.value=this.value.toUpperCase();});

/* ══════════════════════════════════════════
   AUTO-REFRESH EVERY 90 SECONDS
══════════════════════════════════════════ */
const REFRESH_SEC = 120;
let refreshTimer = null;
let countdownTimer = null;
let secondsLeft = REFRESH_SEC;

function startAutoRefresh() {
  stopAutoRefresh();
  secondsLeft = REFRESH_SEC;
  const badge = document.getElementById('refresh-badge');
  const cd = document.getElementById('countdown');
  if (badge) badge.style.display = 'inline-flex';

  countdownTimer = setInterval(() => {
    secondsLeft--;
    if (cd) cd.textContent = secondsLeft;
    if (secondsLeft <= 0) {
      secondsLeft = REFRESH_SEC;
      const sym = (document.getElementById('sym').value || '').trim().toUpperCase();
      if (sym) {
        // clear cache entry so fresh data is fetched
        try { sessionStorage.removeItem(cacheKey(sym)); } catch(e) {}
        startAnalysis(true);
      }
    }
  }, 1000);
}

function stopAutoRefresh() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  if (refreshTimer)   { clearInterval(refreshTimer);   refreshTimer = null;   }
  secondsLeft = REFRESH_SEC;
  const badge = document.getElementById('refresh-badge');
  const cd = document.getElementById('countdown');
  if (badge) badge.style.display = 'none';
  if (cd) cd.textContent = REFRESH_SEC;
}

// patch startAnalysis to (re)start the countdown after each successful run
const _origStartAnalysis = startAnalysis;
startAnalysis = async function(forceRefresh=false) {
  await _origStartAnalysis(forceRefresh);
  const sym = (document.getElementById('sym').value || '').trim().toUpperCase();
  if (sym) {
    secondsLeft = REFRESH_SEC;
    const cd = document.getElementById('countdown');
    if (cd) cd.textContent = REFRESH_SEC;
    if (!countdownTimer) startAutoRefresh();
  }
};
</script>
