<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Quant Edge — US Equity Swing System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────
       Background   #090C12  surface   #0F1319  border  #1C2232
       Text         #B8C0CC  dim       #3D4557  muted   #5C6880
       Blue (buy)   #4D8FD6  lt-blue   #7AAEE0
       Teal (pos)   #3BB58A
       Amber (hold) #D4A84B
       Orange(redu) #C07840
       Red  (sell)  #C75C5C
    ─────────────────────────────────────────────────────────────── */
    :root {
      --bg: #090C12;
      --surface: #111620;
      --surface2: #161C28;
      --border: #1C2232;
      --border2: #242C3E;
      --text: #E2E7EF;
      --text-dim: #9BA8BC;
      --text-mid: #B0BBC9;
      --blue: #4D8FD6;
      --blue-lt: #7AAEE0;
      --teal: #3BB58A;
      --amber: #D4A84B;
      --orange: #C07840;
      --red: #C75C5C;
      --red-lt: #D47070;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 15px;
    }

    input,
    button {
      font-family: 'Courier New', monospace;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .fade {
      animation: fadeUp .35s ease forwards
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    /* table row hover */
    tr.scenario:hover td {
      background: rgba(77, 143, 214, .04) !important
    }

    /* mobile base */
    @media(max-width:600px) {
      body {
        font-size: 13px;
      }

      input {
        font-size: 16px !important;
      }

      /* prevent iOS zoom */
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;
    /* ── responsive hook ─────────────────────────────────── */
    function useIsMobile(bp = 640) {
      const [mobile, setMobile] = useState(typeof window !== "undefined" && window.innerWidth < bp);
      useEffect(() => {
        const h = () => setMobile(window.innerWidth < bp);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, [bp]);
      return mobile;
    }

    /* ── palette helpers ─────────────────────────────────────── */
    const C = {
      buy: "#4D8FD6",
      buyLt: "#7AAEE0",
      teal: "#3BB58A",
      amber: "#D4A84B",
      orange: "#C07840",
      red: "#C75C5C",
      redLt: "#D47070",
      text: "#B8C0CC",
      mid: "#5C6880",
      dim: "#3D4557",
    };
    const signalColor = a => ({ BUY: C.teal, HOLD: C.amber, REDUCE: C.orange, SELL: C.red, "NO TRADE": C.mid })[a] || C.mid;
    const riskColor = r => ({ LOW: C.teal, MEDIUM: C.amber, HIGH: C.orange, EXTREME: C.red })[r];

    /* ── math utils ─────────────────────────────────────────── */
    const mean = a => a.reduce((s, v) => s + v, 0) / a.length;
    const std = a => { const m = mean(a); return Math.sqrt(mean(a.map(x => (x - m) ** 2))); };
    const pct = (v, d = 1) => `${(v * 100).toFixed(d)}%`;
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const fmt$ = v => (v !== null && v !== undefined && !isNaN(v)) ? `$${v.toFixed(2)}` : "—";

    /* ── quant calculations — tuned for 1-day to 2-week hold ─── */

    // ATR(13) — Average True Range, proper measure of daily volatility
    function calcATR(c, h, l, period = 13) {
      if (c.length < period + 1) return null;
      const trs = [];
      for (let i = 0; i < period; i++) {
        const hl = h[i] - l[i];
        const hc = Math.abs(h[i] - c[i + 1]);
        const lc = Math.abs(l[i] - c[i + 1]);
        trs.push(Math.max(hl, hc, lc));
      }
      return mean(trs);
    }

    // Short-term momentum (5d, 8d, 21d) — core signals for 1-2 week holding
    function calcMomentum(c) {
      if (c.length < 22) return null;
      const mom5d = (c[0] - c[5]) / c[5];          // 1-week momentum
      const mom8d = (c[0] - c[8]) / c[8];         // ~1.5-week momentum
      const mom21d = (c[0] - c[21]) / c[21];         // 3-week momentum (trend filter)
      // Rate of change acceleration: is 5d stronger than 8d?
      const accel = mom5d - (mom8d / 2);        // positive = accelerating
      return { mom5d, mom8d, mom21d, accel };
    }

    // Amihud illiquidity — use 21d window for swing trading
    function calcAmihud(c, v) {
      const n = Math.min(21, c.length - 1), r = [];
      for (let i = 0; i < n; i++) { const dv = v[i] * c[i]; if (dv > 0) r.push(Math.abs((c[i] - c[i + 1]) / c[i + 1]) / dv); }
      return mean(r) * 1e9;
    }

    // MA trend — use Fibonacci MAs relevant to 1-2 week holds
    function calcTrend(c) {
      if (c.length < 35) return null;
      const ma5 = mean(c.slice(0, 5));
      const ma8 = mean(c.slice(0, 8));
      const ma21 = mean(c.slice(0, 21));
      const ma34 = mean(c.slice(0, 34));
      const ma144 = c.length >= 144 ? mean(c.slice(0, 144)) : null;
      const p = c[0];
      // Slope of MA8 over last 3 days (trend direction)
      const ma8_3dAgo = mean(c.slice(3, 11));
      const ma8slope = (ma8 - ma8_3dAgo) / ma8_3dAgo;
      return {
        ma5, ma8, ma21, ma34, ma144,
        aboveMa5: p > ma5, aboveMa8: p > ma8,
        aboveMa21: p > ma21, aboveMa34: p > ma34,
        aboveMa144: ma144 ? p > ma144 : null,
        ma8slope,                              // positive = uptrend
        trendAligned: p > ma8 && p > ma21 && ma8 > ma21, // short-term stack
      };
    }

    // RSI(8) — more responsive for short-term entries vs RSI(14)
    function calcRSI(c, per = 8) {
      if (c.length < per + 1) return null;
      const ch = c.slice(0, per + 1).map((p, i, a) => i < per ? p - a[i + 1] : null).filter(v => v !== null);
      const ag = mean(ch.map(x => x > 0 ? x : 0)), al = mean(ch.map(x => x < 0 ? -x : 0));
      return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    }

    // Volume surge — high volume confirms breakout/breakdown
    function calcVolume(v, c) {
      if (v.length < 22) return null;
      const avgVol = mean(v.slice(1, 22));         // 21d avg (exclude today)
      const todayVol = v[0];
      const ratio = todayVol / avgVol;
      const dollarVol = todayVol * c[0];
      return { ratio, avgVol, todayVol, dollarVol, surge: ratio > 1.5 };
    }

    // SPY HMM regime — 2-state, use shorter vol window for swing trading
    function calcHMM(s) {
      if (s.length < 55) return { state: "unknown", confidence: 0 };
      const ma55 = mean(s.slice(0, 55));
      const ma21 = mean(s.slice(0, 21));
      const ma233 = s.length >= 233 ? mean(s.slice(0, 233)) : null;
      const p = s[0];
      const rets = s.slice(0, 13).map((v, i, a) => i < 13 ? (v - a[i + 1]) / a[i + 1] : null).filter(Boolean);
      const vol13 = std(rets) * Math.sqrt(252);     // 13-day vol — more responsive
      let state, conf, label;
      if (p > ma55 && p > ma21 && vol13 < 0.20) { state = "BULL"; conf = .86; label = "Risk-On"; }
      else if ((!ma233 || p < ma233) && p < ma55 && vol13 > .30) { state = "BEAR"; conf = .85; label = "Risk-Off"; }
      else if (p > ma55 && vol13 > .25) { state = "TRANSITION"; conf = .62; label = "Elevated Vol"; }
      else if (p < ma55 && p > ma21) { state = "TRANSITION"; conf = .58; label = "Caution"; }
      else { state = "TRANSITION"; conf = .55; label = "Mixed"; }
      return { state, conf, label, ma21, ma55, ma233, vol: vol13 };
    }

    // Kelly — calibrated on 8-day forward returns (matches 1-2 week hold target)
    function calcKelly(c) {
      if (c.length < 144) return null;
      const fwd = [];
      // Use all available 8d windows in past ~100 days
      for (let i = 21; i < Math.min(c.length - 8, 144); i++)fwd.push((c[i - 8] - c[i]) / c[i]);
      const w = fwd.filter(r => r > 0), l = fwd.filter(r => r < 0);
      if (!w.length || !l.length) return null;
      const p = w.length / fwd.length, q = 1 - p, b = mean(w) / Math.abs(mean(l));
      const fStar = (p * b - q) / b;
      return { p, q, b, fStar, fAdj: Math.max(0, .33 * fStar), horizon: "8-day" };
    }

    // CVaR — use 34d window for swing trading tail risk
    function calcCVaR(c) {
      if (c.length < 35) return null;
      const rets = c.slice(0, 34).map((p, i, a) => i < 34 ? (p - a[i + 1]) / a[i + 1] : null).filter(Boolean);
      rets.sort((a, b) => a - b);
      const cut = Math.floor(rets.length * .05);
      const cvar = Math.abs(mean(rets.slice(0, cut + 1))), var95 = Math.abs(rets[cut]);
      // Also compute 5-day max drawdown as swing-specific risk metric
      const dd5 = Math.abs(Math.min(...c.slice(0, 5).map((v, i, a) => i > 0 ? (v - a[0]) / a[0] : 0)));
      return { cvar, var95, annVol: std(rets) * Math.sqrt(252), safe: cvar < .030, dd5 };
    }

    /* ── Sentiment Index Proxy ──────────────────────────
       Calculated from multiple market signals to approximate
       general market sentiment (0-100 scale):
       - 0-25: Extreme Fear  (bearish)
       - 25-45: Fear
       - 45-55: Neutral
       - 55-75: Greed
       - 75-100: Extreme Greed (bullish)

       Components:
       - Price momentum (20d, 10d, 5d)
       - Market breadth proxy (SPY trend)
       - Volatility regime (from HMM)
       - RSI strength
       - Trend alignment
    ─────────────────────────────────────────────────────────── */
    function calcSentimentIndex(mom, hmm, rsi, trend, vol) {
      if (!mom || !hmm || rsi == null) return null;

      // Normalize each component to 0-25 range
      // 1. Momentum component (0-25): centered at 12.5, higher range for more sensitivity
      const momScore = Math.max(0, Math.min(25,
        (mom.mom5d * 300) + 12.5  // scale: approx +/- 4% momentum shifts score significantly
      ));

      // 2. Trend component (0-25): weighted for strong trend alignment
      let trendScore = 12.5; // neutral default
      if (trend.trendAligned && trend.ma8slope > 0) trendScore = 25;
      else if (trend.trendAligned) trendScore = 22;
      else if (trend.aboveMa8 && trend.aboveMa21) trendScore = 18;
      else if (!trend.aboveMa8 && !trend.aboveMa21) trendScore = 5;
      else if (!trend.aboveMa8) trendScore = 8;

      // 3. Regime component (0-25): based on HMM state
      let regimeScore = 12.5;
      if (hmm.state === "BULL") regimeScore = 25;
      else if (hmm.state === "TRANSITION") regimeScore = 15;
      else regimeScore = 5;

      // 4. RSI component (0-25): shifted to match typical "Greed" RSI zones (60-70)
      const rsiVal = rsi || 50;
      const rsiScore = Math.max(0, Math.min(25,
        (rsiVal - 40) * 0.6 + 12.5  // Center at 50 RSI -> 12.5, 70 RSI -> ~30 (clamped to 25)
      ));

      // Combine with equal weighting
      const sentimentIndex = Math.max(0, Math.min(100, Math.round(momScore + trendScore + regimeScore + rsiScore)));

      // Determine sentiment category
      let label;
      if (sentimentIndex >= 75) label = "Extreme Greed";
      else if (sentimentIndex >= 55) label = "Greed";
      else if (sentimentIndex >= 45) label = "Neutral";
      else if (sentimentIndex >= 25) label = "Fear";
      else label = "Extreme Fear";

      // Color coding
      const color = sentimentIndex >= 55 ? C.teal
        : sentimentIndex >= 45 ? C.amber
          : C.red;

      return {
        index: sentimentIndex,
        label,
        color,
        components: { momScore, trendScore, regimeScore, rsiScore },
        bullish: sentimentIndex >= 55,
        bearish: sentimentIndex <= 25
      };
    }

    /* ── 1h quant calculations ───────────────────────────────── */

    // 1h momentum: last 5h, 13h, 21h
    function calcMomentum1h(hc) {
      if (!hc || hc.length < 22) return null;
      const mom5h = (hc[0] - hc[5]) / hc[5];
      const mom13h = (hc[0] - hc[13]) / hc[13];
      const mom21h = (hc[0] - hc[21]) / hc[21];
      // Intraday trend: MA5h vs MA21h
      const ma5h = mean(hc.slice(0, 5));
      const ma21h = mean(hc.slice(0, 21));
      const trendUp = hc[0] > ma5h && ma5h > ma21h;
      const trendDn = hc[0] < ma5h && ma5h < ma21h;
      return { mom5h, mom13h, mom21h, ma5h, ma21h, trendUp, trendDn };
    }

    // 1h RSI(8) — faster signal for entry timing
    function calcRSI1h(hc, per = 8) {
      if (!hc || hc.length < per + 1) return null;
      const ch = hc.slice(0, per + 1).map((p, i, a) => i < per ? p - a[i + 1] : null).filter(v => v !== null);
      const ag = mean(ch.map(x => x > 0 ? x : 0)), al = mean(ch.map(x => x < 0 ? -x : 0));
      return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    }

    // 1h volume: compare last bar vs 21h avg — detects intraday surges
    function calcVol1h(hD) {
      if (!hD || hD.length < 22) return null;
      const hv = hD.map(d => parseFloat(d.volume || 0));
      const hc = hD.map(d => parseFloat(d.close));
      const avg21h = mean(hv.slice(1, 22));
      const ratio = avg21h > 0 ? hv[0] / avg21h : 1;
      return { ratio, surge: ratio > 1.8, priceUp: hc[0] > hc[1] };
    }


    /* ── Price Action calculations ───────────────────────────
       Uses OHLC daily data. Detects:
       1. Candlestick patterns (last 2 bars)
       2. Breakout vs 20-day range
       3. Pivot S/R levels
       4. HH/LL trend structure (swing highs/lows)
    ─────────────────────────────────────────────────────────── */
    function calcPriceAction(c, h, l, o) {
      if (!o || c.length < 22 || h.length < 22 || l.length < 22 || o.length < 22) return null;

      const price = c[0];
      const bodySize = i => Math.abs(c[i] - o[i]);
      const candleRange = i => h[i] - l[i];
      const isGreen = i => c[i] > o[i];
      const upperWick = i => h[i] - Math.max(c[i], o[i]);
      const lowerWick = i => Math.min(c[i], o[i]) - l[i];

      // ── Candlestick Patterns ─────────────────────────────
      const patterns = [];

      // Bullish Engulfing: today green body fully wraps yesterday red body
      if (!isGreen(1) && isGreen(0) && o[0] <= c[1] && c[0] >= o[1] && bodySize(0) > bodySize(1) * 1.1)
        patterns.push({ name: "Bullish Engulfing", bias: 1, strength: "strong" });

      // Bearish Engulfing: today red body fully wraps yesterday green body
      if (isGreen(1) && !isGreen(0) && o[0] >= c[1] && c[0] <= o[1] && bodySize(0) > bodySize(1) * 1.1)
        patterns.push({ name: "Bearish Engulfing", bias: -1, strength: "strong" });

      // Hammer: small body at top, long lower wick (≥2× body), tiny upper wick
      if (lowerWick(0) >= bodySize(0) * 2 && upperWick(0) <= bodySize(0) * 0.4 && candleRange(0) > 0)
        patterns.push({ name: "Hammer", bias: 1, strength: "moderate" });

      // Shooting Star: small body at bottom, long upper wick (≥2× body)
      if (upperWick(0) >= bodySize(0) * 2 && lowerWick(0) <= bodySize(0) * 0.4 && candleRange(0) > 0)
        patterns.push({ name: "Shooting Star", bias: -1, strength: "moderate" });

      // Doji: body < 10% of range — indecision
      if (bodySize(0) < candleRange(0) * 0.1 && candleRange(0) > 0)
        patterns.push({ name: "Doji", bias: 0, strength: "weak" });

      // Bullish Harami: yesterday big red, today small green inside it
      if (!isGreen(1) && isGreen(0) && o[0] > c[1] && c[0] < o[1] && bodySize(0) < bodySize(1) * 0.5)
        patterns.push({ name: "Bullish Harami", bias: 1, strength: "moderate" });

      // Bearish Harami: yesterday big green, today small red inside it
      if (isGreen(1) && !isGreen(0) && o[0] < c[1] && c[0] > o[1] && bodySize(0) < bodySize(1) * 0.5)
        patterns.push({ name: "Bearish Harami", bias: -1, strength: "moderate" });

      // Morning Star (3-bar): big red, small body gap, big green
      if (c.length >= 3 && !isGreen(2) && bodySize(1) < bodySize(2) * 0.4 && isGreen(0) && c[0] > o[2])
        patterns.push({ name: "Morning Star", bias: 1, strength: "strong" });

      // Evening Star (3-bar): big green, small body, big red
      if (c.length >= 3 && isGreen(2) && bodySize(1) < bodySize(2) * 0.4 && !isGreen(0) && c[0] < o[2])
        patterns.push({ name: "Evening Star", bias: -1, strength: "strong" });

      // ── Breakout Detection ───────────────────────────────
      const hi21 = Math.max(...h.slice(1, 22));  // exclude today
      const lo21 = Math.min(...l.slice(1, 22));
      const hi5 = Math.max(...h.slice(1, 6));
      const lo5 = Math.min(...l.slice(1, 6));
      const rangeWidth = (hi21 - lo21) / lo21;

      const breakout21dHigh = price > hi21;
      const breakout21dLow = price < lo21;
      const breakout5dHigh = price > hi5 && !breakout21dHigh;
      const nearResistance = (hi21 - price) / price < 0.015 && !breakout21dHigh; // within 1.5%
      const nearSupport = (price - lo21) / price < 0.015 && !breakout21dLow;

      // ── Pivot S/R (last 21 days, look for swing highs/lows) ──
      const pivotHighs = [], pivotLows = [];
      for (let i = 2; i < Math.min(21, h.length - 2); i++) {
        if (h[i] > h[i - 1] && h[i] > h[i + 1] && h[i] > h[i - 2] && h[i] > h[i + 2])
          pivotHighs.push(h[i]);
        if (l[i] < l[i - 1] && l[i] < l[i + 1] && l[i] < l[i - 2] && l[i] < l[i + 2])
          pivotLows.push(l[i]);
      }
      // Nearest resistance above and support below current price
      const resistances = pivotHighs.filter(p => p > price).sort((a, b) => a - b);
      const supports = pivotLows.filter(p => p < price).sort((a, b) => b - a);
      const nearestRes = resistances[0] || null;
      const nearestSup = supports[0] || null;
      const distToRes = nearestRes ? (nearestRes - price) / price : null;
      const distToSup = nearestSup ? (price - nearestSup) / price : null;

      // ── HH/LL Trend Structure (swing highs/lows over 13 days) ──
      const highs13 = h.slice(0, 13), lows13 = l.slice(0, 13);
      const recentHigh = Math.max(...highs13.slice(0, 5));
      const prevHigh = Math.max(...highs13.slice(5, 13));
      const recentLow = Math.min(...lows13.slice(0, 5));
      const prevLow = Math.min(...lows13.slice(5, 13));
      const hhll = recentHigh > prevHigh && recentLow > prevLow ? "HH+HL"   // uptrend structure
        : recentHigh < prevHigh && recentLow < prevLow ? "LH+LL"   // downtrend structure
          : recentHigh > prevHigh && recentLow < prevLow ? "HH+LL"   // expansion
            : "LH+HL";                                            // contraction

      // ── Consolidated PA bias ─────────────────────────────
      const patternBias = patterns.reduce((s, p) => s + p.bias * (p.strength === "strong" ? 2 : 1), 0);

      return {
        patterns, patternBias,
        breakout21dHigh, breakout21dLow, breakout5dHigh,
        nearResistance, nearSupport,
        hi21, lo21, hi5, lo5, rangeWidth,
        nearestRes, nearestSup, distToRes, distToSup,
        hhll
      };
    }

    /* ── signal engine — 1-day to 2-week swing framework ────── */
    function buildSignal(price, atr, mom, amihud, trend, rsi, vol, hmm, kelly, cvar, mom1h, rsi1h, vol1h, pa, cnnFg, vix) {
      if (!mom || !kelly || !cvar || !hmm || !trend) return null;
      let score = 0; const notes = [];
      const { mom5d, mom8d, mom21d, accel } = mom;

      // 1. SPY Regime gate (critical filter — always applied first)
      if (hmm.state === "BULL") score += 3;
      else if (hmm.state === "TRANSITION") { score += 1; notes.push("Market in transition — reduce size, higher bar for entry"); }
      else { score -= 4; notes.push("Bear regime — only high-conviction setups qualify"); }

      // 2. Short-term momentum (5d) — primary swing signal
      if (mom5d > .04) { score += 2; notes.push(`Strong 5-day momentum +${pct(mom5d)} — trend continuation`); }
      else if (mom5d > .015) score += 1;
      else if (mom5d < -.04) { score -= 2; notes.push(`Negative 5-day momentum ${pct(mom5d)} — avoid long entry`); }
      else if (mom5d < -.015) score -= 1;

      // 3. Momentum acceleration (5d vs 10d) — signals near-term thrust
      if (accel > .02) { score += 1; notes.push("Momentum accelerating — short-term thrust confirmed"); }
      else if (accel < -.02) { score -= 1; notes.push("Momentum decelerating — potential near-term fade"); }

      // 4. Short-term MA stack (MA8 > MA21 > MA34) — swing trend structure
      if (trend.trendAligned && trend.ma8slope > 0) score += 2;
      else if (trend.aboveMa8 && trend.aboveMa21) score += 1;
      else if (!trend.aboveMa8 && !trend.aboveMa21) { score -= 2; notes.push("Price below MA8 and MA21 — short-term downtrend"); }
      else score -= 1;

      // 5. RSI(8) — short-period RSI for swing timing
      if (rsi !== null) {
        if (rsi < 25) { score += 2; notes.push(`RSI(8) deeply oversold at ${rsi.toFixed(0)} — high bounce probability`); }
        else if (rsi < 40) { score += 1; notes.push(`RSI(8) oversold at ${rsi.toFixed(0)} — pullback entry opportunity`); }
        else if (rsi > 80) { score -= 2; notes.push(`RSI(8) overbought at ${rsi.toFixed(0)} — wait for consolidation`); }
        else if (rsi > 65) score -= 1;
        else if (rsi > 45) score += 1;
      }

      // 6. Volume confirmation — surge on up-day validates breakout
      if (vol) {
        const priceUp = mom5d > 0;
        if (vol.surge && priceUp) { score += 1; notes.push(`Volume surge ${vol.ratio.toFixed(1)}× avg — institutional buying confirmed`); }
        if (vol.surge && !priceUp) { score -= 1; notes.push(`Volume surge on down-move — distribution signal`); }
      }

      // 7. 1h momentum confirmation — intraday alignment with daily signal
      if (mom1h) {
        if (mom1h.trendUp && mom1h.mom5h > .01) { score += 1; notes.push(`1h trend aligned: +${pct(mom1h.mom5h, 1)} past 5h — intraday confirmation`); }
        if (mom1h.trendDn && mom1h.mom5h < -.01) { score -= 1; notes.push(`1h trend bearish: ${pct(mom1h.mom5h, 1)} past 5h — wait for reversal`); }
      }

      // 8. 1h RSI entry timing — avoid chasing overbought on hourly
      if (rsi1h !== null) {
        if (rsi1h < 25) { score += 1; notes.push(`1h RSI oversold at ${rsi1h.toFixed(0)} — intraday entry timing favourable`); }
        else if (rsi1h > 80) { score -= 1; notes.push(`1h RSI overbought at ${rsi1h.toFixed(0)} — wait for hourly pullback`); }
      }

      // 9. 1h volume surge — intraday institutional activity
      if (vol1h) {
        if (vol1h.surge && vol1h.priceUp) { score += 1; notes.push(`1h volume surge ${vol1h.ratio.toFixed(1)}× avg on uptick — intraday buying pressure`); }
        if (vol1h.surge && !vol1h.priceUp) { score -= 1; notes.push(`1h volume surge on downtick — intraday distribution signal`); }
      }

      // 10. CNN Fear & Greed Index — market sentiment overlay
      if (cnnFg) {
        if (cnnFg.bullish) { score += 1; notes.push(`CNN Fear & Greed at ${cnnFg.index} (${cnnFg.label}) — greed phase, bullish sentiment`); }
        else if (cnnFg.bearish) { score -= 2; notes.push(`CNN Fear & Greed at ${cnnFg.index} (${cnnFg.label}) — fear phase, avoid aggressive longs`); }
        // Extreme greed warning
        if (cnnFg.index >= 80) { score -= 1; notes.push(`CNN Fear & Greed EXTREME at ${cnnFg.index} — market may be overheated, reduce position size`); }
        // Extreme fear opportunity
        if (cnnFg.index <= 15) { score += 1; notes.push(`CNN Fear & Greed EXTREME FEAR at ${cnnFg.index} — potential contrarian opportunity`); }
      }

      // 11. VIX — volatility regime filter
      if (vix) {
        score += vix.regimeScore;
        if (vix.value < 15) { notes.push(`VIX at ${vix.value.toFixed(1)} (${vix.regimeLabel}) — low volatility, bullish environment`); }
        else if (vix.value >= 25 && vix.value < 30) { notes.push(`VIX elevated at ${vix.value.toFixed(1)} (${vix.regimeLabel}) — reduce position size`); }
        else if (vix.value >= 30) { notes.push(`VIX HIGH at ${vix.value.toFixed(1)} (${vix.regimeLabel}) — extreme caution, market stress`); }
        // VIX rising warning
        if (vix.trend === "rising" && vix.value > 20) { notes.push(`VIX rising — volatility increasing, hedge positions`); }
      }

      // 12. Liquidity filter (same — critical for execution)
      if (amihud > 5) { score -= 2; notes.push("Low liquidity — high slippage, widen stops or skip"); }
      else if (amihud < .5) score += 1;

      // 13. CVaR tail risk check
      if (!cvar.safe) { score -= 1; notes.push(`Tail risk elevated: CVaR(95%) = ${pct(cvar.cvar)} — reduce size`); }

      // 14. Price Action — patterns, breakout, structure
      if (pa) {
        // Candlestick pattern bias
        if (pa.patternBias >= 2) { score += 2; notes.push(`PA: ${pa.patterns.map(p => p.name).join(" + ")} — strong bullish signal`); }
        else if (pa.patternBias === 1) { score += 1; notes.push(`PA: ${pa.patterns.map(p => p.name).join(" + ")} — bullish pattern`); }
        else if (pa.patternBias <= -2) { score -= 2; notes.push(`PA: ${pa.patterns.map(p => p.name).join(" + ")} — strong bearish signal`); }
        else if (pa.patternBias === -1) { score -= 1; notes.push(`PA: ${pa.patterns.map(p => p.name).join(" + ")} — bearish pattern`); }
        // Breakout
        if (pa.breakout21dHigh) { score += 2; notes.push(`PA: Breakout above 21-day high $${pa.hi21.toFixed(2)} — momentum breakout`); }
        else if (pa.breakout5dHigh) { score += 1; notes.push(`PA: Breaking above 5-day high $${pa.hi5.toFixed(2)}`); }
        if (pa.breakout21dLow) { score -= 2; notes.push(`PA: Breakdown below 21-day low $${pa.lo21.toFixed(2)} — bearish breakdown`); }
        // Near resistance — trim / caution
        if (pa.nearResistance && pa.distToRes !== null)
          notes.push(`PA: Near 21-day resistance $${pa.nearestRes?.toFixed(2)} (+${pct(pa.distToRes, 1)}) — consider partial exit`);
        if (pa.nearSupport && pa.distToSup !== null)
          notes.push(`PA: Near 20-day support $${pa.nearestSup?.toFixed(2)} — good risk/reward entry zone`);
        // HH/HL trend structure
        if (pa.hhll === "HH+HL") score += 1;
        else if (pa.hhll === "LH+LL") score -= 1;
      }

      // ── Action determination ─────────────────────────────────
      let action, direction;
      if (hmm.state === "BEAR" && score < 43) { action = "SELL"; direction = "FLAT"; }
      else if (hmm.state === "BEAR") { action = "REDUCE"; direction = "FLAT"; }
      else if (score >= 70) { action = "BUY"; direction = "LONG"; }
      else if (score >= 63) { action = "BUY"; direction = "LONG"; }
      else if (score >= 55) { action = "HOLD"; direction = "LONG"; }
      else if (score >= 48) { action = "HOLD"; direction = "FLAT"; }
      else { action = "REDUCE"; direction = "FLAT"; }

      // ── Risk level (swing-appropriate thresholds) ─────────────
      const v = cvar.annVol;
      const risk = v < .22 && hmm.state === "BULL" && amihud < 1 ? "LOW"
        : v < .35 && hmm.state !== "BEAR" ? "MEDIUM"
          : v < .55 ? "HIGH" : "EXTREME";

      // ── Position size ────────────────────────────────────────
      const regM = { BULL: 1, TRANSITION: .5, BEAR: 0 }[hmm.state] ?? 0;
      const rkM = { LOW: 1, MEDIUM: .75, HIGH: .5, EXTREME: .25 }[risk];
      const acM = { BUY: 1, HOLD: .6, REDUCE: .2, SELL: 0 }[action] ?? 0;
      const size = clamp(Math.round(kelly.fAdj * regM * rkM * acM * 1000) / 10, 0, 15);

      // ── ATR-based trade levels (proper ATR, not CVaR proxy) ──
      // For 1-2 week swing: stop=1.5× ATR, target=3× ATR (2:1 R/R)
      const atrVal = atr || cvar.var95 * price;
      const stopDist = atrVal * 1.5;
      const targetDist = atrVal * 3.0;
      const stop = price - stopDist;
      const target = price + targetDist;
      const rr = targetDist / stopDist;             // always 2.0 with 1.5/3.0
      const stopPct = stopDist / price;
      const targetPct = targetDist / price;
      // Max holding period hint
      const holdDays = `1–10 days`;

      // ── Normalize score to 0-100 scale ────────────────────────
      // Raw score typically ranges from -15 (bearish) to +20 (bullish)
      // Map to 0-100: 0 = most bearish, 50 = neutral, 100 = most bullish
      const rawNorm = 50 + score * 2.5;
      const normalizedScore = isNaN(rawNorm) ? 50 : Math.max(0, Math.min(100, Math.round(rawNorm)));

      const aColor = signalColor(action);
      const rColor = riskColor(risk);

      return {
        action, direction, risk, rColor, aColor, size,
        stop, target, rr, stopPct, targetPct, holdDays,
        score: normalizedScore, rawScore: score, maxScore: 100, notes, kelly, hmm, cvar, trend, rsi, vol,
        mom5d, mom8d, mom21d, accel, amihud, mom1h, rsi1h, vol1h, pa, cnnFg, vix,
        factors: [
          { label: "SPY Regime", value: hmm.label, color: hmm.state === "BULL" ? C.teal : hmm.state === "BEAR" ? C.red : C.amber },
          { label: "5D Momentum", value: pct(mom5d), color: mom5d > .015 ? C.teal : mom5d > 0 ? C.amber : C.red },
          { label: "10D Momentum", value: pct(mom8d), color: mom8d > .02 ? C.teal : mom8d > 0 ? C.amber : C.red },
          { label: "MA Stack (daily)", value: trend.trendAligned ? "Aligned" : "Broken", color: trend.trendAligned ? C.teal : C.red },
          { label: "RSI-7 (daily)", value: rsi ? rsi.toFixed(1) : "—", color: rsi < 40 ? C.teal : rsi > 65 ? C.red : C.amber },
          { label: "Volume (daily)", value: vol ? `${vol.ratio.toFixed(1)}×` : "—", color: vol?.surge && mom5d > 0 ? C.teal : vol?.surge && mom5d < 0 ? C.red : C.amber },

    /* ── API — Batch Mode ────────────────────────────────────
       Call 1: daily data for ticker+SPY in one request (multi-symbol)
       Call 2: 1h data for ticker only

    ──────────────────────────────────────────────────────── */
    const KEY = "934f233f1c934c92a767bb9e52191d6d";
    const BASE = "https://api.twelvedata.com/time_series";

    // Multi-symbol daily batch: returns {TICKER:{values}, SPY:{values}}
    async function fetchDailyBatch(sym, n = 300) {
      const url = `${BASE}?symbol=${sym},SPY&interval=1day&outputsize=${n}&apikey=${KEY}&dp=4`;
      const d = await (await fetch(url)).json();
      // If only one symbol returned, d.values exists directly
      const tickerD = d[sym] || d;
      const spyD = d["SPY"] || {};
      if (tickerD.status === "error") throw new Error(tickerD.message || "Fetch error: " + sym);
      if (!tickerD.values?.length) throw new Error("No daily data: " + sym);
      if (!spyD.values?.length) throw new Error("No daily data: SPY");
      return { ticker: tickerD.values, spy: spyD.values };
    }

    // 1-hour data for ticker only — ~80 bars ≈ 2 weeks of trading hours
    async function fetch1h(sym, n = 80) {
      const url = `${BASE}?symbol=${sym}&interval=1h&outputsize=${n}&apikey=${KEY}&dp=4`;
      const d = await (await fetch(url)).json();
      if (d.status === "error") throw new Error(d.message);
      if (!d.values?.length) throw new Error("No 1h data: " + sym);
      return d.values;
    }

    // Combined batch fetch: 2 parallel requests → 3 datasets
    async function fetchAll(sym) {
      const [daily, hourly] = await Promise.all([
        fetchDailyBatch(sym, 300),
        fetch1h(sym, 80)
      ]);
      return {
        tickerDaily: daily.ticker,
        spyDaily: daily.spy,
        tickerHourly: hourly
      };
    }

    // ── Heikin-Ashi calculator ──────────────────────────────────────────
    // Input: arrays newest-first; returns HA bars array oldest-first for chart
    function calcHA(c, h, l, o) {
      if (!c || !h || !l || !o || c.length < 2) return [];
      // Reverse to chronological order (oldest first)
      const C2 = [...c].reverse(), H2 = [...h].reverse(), L2 = [...l].reverse(), O2 = [...o].reverse();
      const bars = [];
      for (let i = 0; i < C2.length; i++) {
        const haC = (O2[i] + H2[i] + L2[i] + C2[i]) / 4;
        const haO = i === 0 ? (O2[i] + C2[i]) / 2 : (bars[i - 1].o + bars[i - 1].c) / 2;
        const haH = Math.max(H2[i], haO, haC);
        const haL = Math.min(L2[i], haO, haC);
        bars.push({ o: haO, h: haH, l: haL, c: haC, bull: haC >= haO });
      }
      return bars; // chronological order, newest at end
    }

    // ── Heikin-Ashi candlestick chart ───────────────────────────────────
    const HAChart = ({ bars, h = 90, bullColor, bearColor, label }) => {
      if (!bars || bars.length < 2) return null;
      const bull = bullColor || C.teal;
      const bear = bearColor || C.red;
      const W = 300;
      const allHi = bars.map(b => b.h), allLo = bars.map(b => b.l);
      const hi = Math.max(...allHi), lo = Math.min(...allLo), rng = hi - lo || 1;
      const pad = 4;
      const toY = v => pad + (h - 2 * pad) * (1 - (v - lo) / rng);
      const n = bars.length;
      // candle width with tiny gap
      const cw = Math.max(1, W / n - 1);
      const cx = i => (i + 0.5) * (W / n);

      return (
        <svg width="100%" viewBox={`0 0 ${W} ${h}`} preserveAspectRatio="none"
          style={{ display: "block", overflow: "visible" }}>
          {bars.map((b, i) => {
            const x = cx(i), color = b.bull ? bull : bear;
            const bodyTop = toY(Math.max(b.o, b.c));
            const bodyBot = toY(Math.min(b.o, b.c));
            const bodyH = Math.max(1, bodyBot - bodyTop);
            const wickX = x;
            return (
              <g key={i}>
                {/* wick */}
                <line x1={wickX} y1={toY(b.h)} x2={wickX} y2={toY(b.l)}
                  stroke={color} strokeWidth="0.8" opacity="0.7" />
                {/* body */}
                <rect x={x - cw / 2} y={bodyTop} width={cw} height={bodyH}
                  fill={color} opacity="0.85" />
              </g>
            );
          })}
        </svg>
      );
    };

    // ── Simple sparkline (kept for SPY proxy) ───────────────────────────
    const Spark = ({ data, color, h = 50 }) => {

            calcPriceAction(c, h, l, o), cnnFg, vix
          );
          // Build HA bars: use last 55 daily bars
          const haDaily = calcHA(c.slice(0, 55), h.slice(0, 55), l.slice(0, 55), o.slice(0, 55));
          // 1h HA: use last 55 1h bars
          const h1O = h1D.map(d => parseFloat(d.open || d.close));
          const h1H = h1D.map(d => parseFloat(d.high || d.close));
          const h1L = h1D.map(d => parseFloat(d.low || d.close));
          const h1C = h1D.map(d => parseFloat(d.close));
          const haHourly = calcHA(h1C.slice(0, 55), h1H.slice(0, 55), h1L.slice(0, 55), h1O.slice(0, 55));
          setResult({
            ticker: ticker.toUpperCase(), price,
            chg: (c[0] - c[1]) / c[1],
            closes: c.slice(0, 55).reverse(),
            spyC: sc.slice(0, 55).reverse(),
            hourly: hc.slice(0, 55).reverse(),
            haDaily, haHourly,
            cnnFg, vix,
            sig, ts: new Date().toLocaleString()
          });
          startAutoRefresh(ticker.toUpperCase());
          setBtnState("done");
        } catch (e) { setError(e.message); setBtnState("idle"); }
        finally { setLoading(false); setProg(""); }

              const vixD = await fetchVIX();

              const h = tD.map(d => parseFloat(d.high || d.close));
              const l = tD.map(d => parseFloat(d.low || d.close));

              //const vix = calcVIX(vixCurrent, vixHistory);
              const sig = buildSignal(price, atr, calcMomentum(c), calcAmihud(c, v), trend, rsi,
                calcVolume(v, c), calcHMM(sc), calcKelly(c), calcCVaR(c),
                calcMomentum1h(hc), calcRSI1h(hc), calcVol1h(h1D),
                calcPriceAction(c, h, l, o), cnnFg, vix);
              const haDaily = calcHA(c.slice(0, 55), h.slice(0, 55), l.slice(0, 55), o.slice(0, 55));
              const h1O = tD.map(d => parseFloat(d.open || d.close)); // reuse tD open for 1h proxy

                closes: c.slice(0, 55).reverse(), spyC: sc.slice(0, 55).reverse(),

                hourly: hc.slice(0, 55).reverse(),
                haDaily, haHourly,
                sig, ts: new Date().toLocaleString()
              });
            } catch (_) { }

        if (target === document.documentElement || target === document.body) {
          return;
        }

        // 如果是已选中的元素，不显示悬停高亮
        if (target === selectedElement) {
          highlightBox.style.display = "none";
          tagLabel.style.display = "none";
          return;
        }
        var rect = target.getBoundingClientRect();
        var selector = getElementSelector(target);
        var text = getElementText(target);
        var attributes = getElementAttributes(target);

        // 更新悬停高亮框位置
        highlightBox.style.display = "block";
        highlightBox.style.left = "".concat(rect.left - 2, "px");
        highlightBox.style.top = "".concat(rect.top - 2, "px");
        highlightBox.style.width = "".concat(rect.width + 4, "px");
        highlightBox.style.height = "".concat(rect.height + 4, "px");

        // 更新标签位置和内容
        tagLabel.style.display = "block";
        tagLabel.textContent = "<".concat(target.tagName.toLowerCase(), ">");

        // 计算标签位置，确保不超出视窗
        var labelTop = rect.top - 22;
        var labelLeft = rect.left;

        // 如果标签会超出顶部，显示在元素下方
        if (labelTop < 0) {
          labelTop = rect.bottom + 5;
        }

        // 如果标签会超出右侧，向左调整
        if (labelLeft + tagLabel.offsetWidth > window.innerWidth) {
          labelLeft = window.innerWidth - tagLabel.offsetWidth - 5;
        }
        tagLabel.style.left = "".concat(Math.max(0, labelLeft), "px");
        tagLabel.style.top = "".concat(labelTop, "px");

        // 发送消息到父窗口
        var elementInfo = {
          tagName: target.tagName.toLowerCase(),
          rect: {
            left: rect.left,
            top: rect.top,
            right: rect.right,
            bottom: rect.bottom,
            width: rect.width,
            height: rect.height,
            x: rect.x,
            y: rect.y
          },
          selector: selector,
          text: text,
          attributes: attributes,
          url: window.location.href,
          path: window.location.pathname,
          timestamp: Date.now()
        };
        try {
          window.parent.postMessage({
            type: "iframe-element-hover",
            data: elementInfo,
            source: "iframe-highlight-injector"
          }, "*");
        } catch (error) {
          console.warn("无法发送消息到父窗口:", error);
        }
      }

      // 鼠标离开事件处理
      function handleMouseOut(e) {
        if (!highlightEnabled) return;
        var relatedTarget = e.relatedTarget;

        // 如果鼠标移动到高亮相关元素上，不隐藏高亮
        if (relatedTarget && (relatedTarget === highlightBox || relatedTarget === tagLabel || relatedTarget === overlay || relatedTarget === selectedBox || relatedTarget === selectedLabel)) {
          return;
        }
        highlightBox.style.display = "none";
        tagLabel.style.display = "none";
        try {
          window.parent.postMessage({
            type: "iframe-element-hover",
            data: null,
            source: "iframe-highlight-injector"
          }, "*");
        } catch (error) {
          console.warn("无法发送消息到父窗口:", error);
        }
      }

      // 点击事件处理
      function handleClick(e) {
        var target = e.target;
        if (!target || target === overlay || target === highlightBox || target === tagLabel || target === selectedBox || target === selectedLabel) {
          return;
        }

        // 避免处理 html 和 body 元素
        if (target === document.documentElement || target === document.body) {
          return;
        }

        // 检查是否是交互元素，这些元素需要保留默认行为
        var isInteractiveElement = ['input', 'textarea', 'select', 'button', 'a'].includes(target.tagName.toLowerCase());

        // 如果高亮功能启用，对于非交互元素阻止默认行为和事件传播
        if (highlightEnabled) {
          e.preventDefault();
          e.stopPropagation();
        }
        var rect = target.getBoundingClientRect();
        var selector = getElementSelector(target);
        var text = getElementText(target);
        var attributes = getElementAttributes(target);
        console.log("Element clicked:", {
          tagName: target.tagName,
          selector: selector,
          rect: rect
        });

        // 立即更新选中高亮
        updateSelectedHighlight(target);

        // 隐藏悬停高亮，因为现在是选中状态
        highlightBox.style.display = "none";
        tagLabel.style.display = "none";
        var elementInfo = {
          tagName: target.tagName.toLowerCase(),
          rect: {
            left: rect.left,
            top: rect.top,
            right: rect.right,
            bottom: rect.bottom,
            width: rect.width,
            height: rect.height,
            x: rect.x,
            y: rect.y
          },
          selector: selector,
          text: text,
          attributes: attributes,
          url: window.location.href,
          path: window.location.pathname,
          timestamp: Date.now()
        };
        try {
          window.parent.postMessage({
            type: "iframe-element-click",
            data: elementInfo,
            source: "iframe-highlight-injector"
          }, "*");
        } catch (error) {
          console.warn("无法发送消息到父窗口:", error);
        }
      }

      // 监听来自父窗口的消息
      function handleParentMessage(event) {
        console.log("Received message from parent:", event.data);
        if (event.data.type === "iframe-highlight-toggle") {
          var enabled = event.data.enabled;
          console.log("Highlight toggle:", enabled);
          if (enabled) {
            enableHighlight();
          } else {
            disableHighlight();
          }
        } else if (event.data.type === "enable-iframe-highlight") {
          console.log("Enable iframe highlight");
          enableHighlight();
        } else if (event.data.type === "disable-iframe-highlight") {
          console.log("Disable iframe highlight");
          disableHighlight();
        } else if (event.data.type === "toggle-iframe-highlight") {
          var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
          console.log("Toggle iframe highlight to:", _enabled);
          if (_enabled) {
            enableHighlight();
          } else {
            disableHighlight();
          }
        } else if (event.data.type === "update-selected-element") {
          var selector = event.data.selector;
          console.log("Update selected element with selector:", selector);
          if (selector) {
            try {
              var element = document.querySelector(selector);
              console.log("Found element by selector:", element);
              updateSelectedHighlight(element);
            } catch (error) {
              console.warn("Failed to select element:", error);
              updateSelectedHighlight(null);
            }
          } else {
            updateSelectedHighlight(null);
          }
        } else if (event.data.type === "clear-selected-element") {
          console.log("Clear selected element");
          updateSelectedHighlight(null);
        }
      }

      // 启用高亮功能
      function enableHighlight() {
        console.log("Enabling highlight");
        document.addEventListener("mouseover", handleMouseOver, true);
        document.addEventListener("mouseout", handleMouseOut, true);
        document.addEventListener("click", handleClick, true);
        highlightEnabled = true;
        overlay.style.display = "block";
      }

      // 禁用高亮功能
      function disableHighlight() {
        console.log("Disabling highlight");
        highlightEnabled = false;
        // 保持事件监听器，但通过 highlightEnabled 变量控制行为
        // 这样可以保留选中状态的显示
        highlightBox.style.display = "none";
        tagLabel.style.display = "none";
        // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
      }

      // 完全禁用高亮功能（移除所有监听器）
      function fullyDisableHighlight() {
        console.log("Fully disabling highlight");
        highlightEnabled = false;
        document.removeEventListener("mouseover", handleMouseOver, true);
        document.removeEventListener("mouseout", handleMouseOut, true);
        document.removeEventListener("click", handleClick, true);
        overlay.style.display = "none";
        highlightBox.style.display = "none";
        tagLabel.style.display = "none";
        selectedBox.style.display = "none";
        selectedLabel.style.display = "none";
      }

      // 添加事件监听
      enableHighlight();
      window.addEventListener("message", handleParentMessage);

      // 暴露全局函数供外部调用
      window.__iframeHighlightControl = {
        enable: enableHighlight,
        disable: disableHighlight,
        fullyDisable: fullyDisableHighlight,
        isEnabled: function isEnabled() {
          return highlightEnabled;
        },
        getSelectedElement: function getSelectedElement() {
          return selectedElement;
        },
        updateSelected: updateSelectedHighlight,
        // 通过消息发送开关控制
        sendToggleMessage: function sendToggleMessage(enabled) {
          window.parent.postMessage({
            type: 'iframe-highlight-status',
            enabled: enabled || highlightEnabled,
            source: 'iframe-highlight-injector'
          }, '*');
        }
      };

      // 通知父窗口脚本已加载
      try {
        window.parent.postMessage({
          type: "iframe-highlight-ready",
          data: {
            url: window.location.href,
            userAgent: navigator.userAgent,
            timestamp: Date.now()
          },
          source: "iframe-highlight-injector"
        }, "*");
      } catch (error) {
        console.warn("无法发送就绪消息到父窗口:", error);
      }

      // 清理函数
      window.__iframeHighlightCleanup = function () {
        fullyDisableHighlight();
        window.removeEventListener("message", handleParentMessage);
        if (overlay.parentElement) {
          overlay.parentElement.removeChild(overlay);
        }
        delete window.__iframeHighlightInitialized;
        delete window.__iframeHighlightCleanup;
      };
    })();

  </script>
</body>
