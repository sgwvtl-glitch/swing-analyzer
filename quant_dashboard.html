<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quant Edge — US Equity Swing System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080808; }
    input, button { font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    // ─── Utility helpers ─────────────────────────────────────────────
    const mean = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
    const std = arr => {
      const m = mean(arr);
      return Math.sqrt(mean(arr.map(x => (x - m) ** 2)));
    };
    const pct = (v, digits = 2) => `${(v * 100).toFixed(digits)}%`;

    // ─── Quant calculations ──────────────────────────────────────────
    function calcMomentum(closes) {
      if (closes.length < 260) return null;
      const m1ago  = closes[21];
      const m12ago = closes[252];
      return (m1ago - m12ago) / m12ago;
    }

    function calcAmihud(closes, volumes) {
      const n = Math.min(60, closes.length - 1);
      const ratios = [];
      for (let i = 0; i < n; i++) {
        const ret = Math.abs((closes[i] - closes[i + 1]) / closes[i + 1]);
        const vol = volumes[i] * closes[i];
        if (vol > 0) ratios.push(ret / vol);
      }
      return mean(ratios) * 1e9;
    }

    function calcHMM(spyCloses) {
      if (spyCloses.length < 200) return { state: "unknown", confidence: 0 };
      const ma200   = mean(spyCloses.slice(0, 200));
      const ma50    = mean(spyCloses.slice(0, 50));
      const current = spyCloses[0];
      const above200 = current > ma200;
      const above50  = current > ma50;
      const rets = spyCloses.slice(0, 21)
        .map((p, i, a) => i < 20 ? (p - a[i + 1]) / a[i + 1] : null)
        .filter(Boolean);
      const vol20 = std(rets) * Math.sqrt(252);
      let state, confidence;
      if (above200 && above50 && vol20 < 0.20)       { state = "RISK_ON";  confidence = 0.85; }
      else if (!above200 && !above50 && vol20 > 0.25) { state = "RISK_OFF"; confidence = 0.88; }
      else                                             { state = "RISK_ON";  confidence = 0.55; }
      return { state, confidence, ma200, ma50, vol20 };
    }

    function calcKelly(closes) {
      if (closes.length < 260) return null;
      const fwdReturns = [];
      for (let i = 252; i < closes.length - 5; i++) {
        fwdReturns.push((closes[i - 5] - closes[i]) / closes[i]);
      }
      const wins   = fwdReturns.filter(r => r > 0);
      const losses = fwdReturns.filter(r => r < 0);
      if (!wins.length || !losses.length) return null;
      const p     = wins.length / fwdReturns.length;
      const q     = 1 - p;
      const b     = mean(wins) / Math.abs(mean(losses));
      const fStar = (p * b - q) / b;
      const fAdj  = Math.max(0, 0.33 * fStar);
      return { p, q, b, fStar, fAdj, wins: wins.length, losses: losses.length };
    }

    function calcCVaR(closes, confidence = 0.95) {
      if (closes.length < 60) return null;
      const rets = closes.slice(0, 60)
        .map((p, i, a) => i < 59 ? (p - a[i + 1]) / a[i + 1] : null)
        .filter(Boolean);
      rets.sort((a, b) => a - b);
      const cutoff = Math.floor(rets.length * (1 - confidence));
      const tail   = rets.slice(0, cutoff + 1);
      const cvar   = Math.abs(mean(tail));
      const var95  = Math.abs(rets[cutoff]);
      return { cvar, var95, safe: cvar < 0.02 };
    }

    function generateSignal(momentum, amihud, hmm, kelly, cvar) {
      if (!momentum || !kelly || !cvar || !hmm) return null;
      let score = 0;
      const factors = [];

      if (momentum > 0.05)      { score += 2; factors.push({ label: "Momentum",   value: "+Strong",       color: "#00ff88" }); }
      else if (momentum > 0)    { score += 1; factors.push({ label: "Momentum",   value: "+Weak",         color: "#88ff88" }); }
      else                      { score -= 1; factors.push({ label: "Momentum",   value: "Negative",      color: "#ff6b6b" }); }

      if (amihud < 0.5)         { score += 1; factors.push({ label: "Liquidity",  value: "High",          color: "#00ff88" }); }
      else if (amihud < 2.0)    {             factors.push({ label: "Liquidity",  value: "Medium",        color: "#ffd700" }); }
      else                      { score -= 1; factors.push({ label: "Liquidity",  value: "Low",           color: "#ff6b6b" }); }

      if (hmm.state === "RISK_ON") { score += 2; factors.push({ label: "Regime",  value: "Risk-On",       color: "#00ff88" }); }
      else                         { score -= 2; factors.push({ label: "Regime",  value: "Risk-Off",      color: "#ff6b6b" }); }

      if (kelly.fAdj > 0.05)    { score += 1; factors.push({ label: "Kelly Edge", value: pct(kelly.fAdj), color: "#00ff88" }); }
      else                      { score -= 1; factors.push({ label: "Kelly Edge", value: "Marginal",      color: "#ff6b6b" }); }

      if (cvar.safe)            { score += 1; factors.push({ label: "CVaR(95%)",  value: pct(cvar.cvar),  color: "#00ff88" }); }
      else                      { score -= 1; factors.push({ label: "CVaR(95%)",  value: "⚠ " + pct(cvar.cvar), color: "#ff6b6b" }); }

      let signal, color;
      if (hmm.state === "RISK_OFF") { signal = "NO TRADE";   color = "#ff6b6b"; }
      else if (score >= 5)          { signal = "STRONG BUY"; color = "#00ff88"; }
      else if (score >= 3)          { signal = "BUY";        color = "#88ff88"; }
      else if (score >= 1)          { signal = "WEAK BUY";   color = "#ffd700"; }
      else                          { signal = "AVOID";      color = "#ff6b6b"; }

      return { signal, color, score, maxScore: 7, factors };
    }

    // ─── API fetch ───────────────────────────────────────────────────
    const API_KEY = "934f233f1c934c92a767bb9e52191d6d";

    async function fetchTimeSeries(symbol, outputsize = 300) {
      const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1day&outputsize=${outputsize}&apikey=${API_KEY}&dp=4`;
      const res  = await fetch(url);
      const data = await res.json();
      if (data.status === "error") throw new Error(data.message);
      if (!data.values || data.values.length === 0) throw new Error("No data returned for " + symbol);
      return data.values;
    }

    // ─── Sub-components ──────────────────────────────────────────────
    const MetricCard = ({ title, value, sub, color, badge }) => (
      <div style={{
        background: "rgba(0,0,0,0.4)", border: `1px solid ${color || "#333"}33`,
        borderLeft: `3px solid ${color || "#555"}`, padding: "14px 16px", borderRadius: 4,
        fontFamily: "'Courier New', monospace"
      }}>
        <div style={{ fontSize: 10, color: "#666", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>{title}</div>
        <div style={{ fontSize: 22, fontWeight: 700, color: color || "#e0e0e0", lineHeight: 1 }}>{value}</div>
        {sub   && <div style={{ fontSize: 11, color: "#555", marginTop: 5 }}>{sub}</div>}
        {badge && <div style={{ fontSize: 10, color: badge.color, marginTop: 4, fontWeight: 600 }}>{badge.text}</div>}
      </div>
    );

    const ProgressBar = ({ label, value, max, color }) => (
      <div style={{ marginBottom: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#666", marginBottom: 4, fontFamily: "monospace" }}>
          <span>{label}</span><span style={{ color }}>{value}</span>
        </div>
        <div style={{ height: 3, background: "#1a1a1a", borderRadius: 2 }}>
          <div style={{ height: "100%", width: `${Math.min(100, (parseFloat(value) / max) * 100)}%`, background: color, borderRadius: 2, transition: "width 0.8s ease" }} />
        </div>
      </div>
    );

    const SparkLine = ({ data, color = "#00ff88", height = 50 }) => {
      if (!data || data.length < 2) return null;
      const min   = Math.min(...data), max = Math.max(...data);
      const range = max - min || 1;
      const W = 200, H = height;
      const pts = data.map((v, i) => {
        const x = (i / (data.length - 1)) * W;
        const y = H - ((v - min) / range) * (H - 4) - 2;
        return `${x},${y}`;
      }).join(" ");
      return (
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display: "block" }}>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
        </svg>
      );
    };

    // ─── Main App ────────────────────────────────────────────────────
    function QuantDashboard() {
      const [ticker,   setTicker]   = useState("AAPL");
      const [loading,  setLoading]  = useState(false);
      const [error,    setError]    = useState(null);
      const [result,   setResult]   = useState(null);
      const [progress, setProgress] = useState("");

      const analyze = useCallback(async () => {
        if (!ticker.trim()) { setError("Please enter a ticker symbol"); return; }
        setLoading(true); setError(null); setResult(null);
        try {
          setProgress("Fetching " + ticker.toUpperCase() + " daily data…");
          const tickerData = await fetchTimeSeries(ticker.toUpperCase(), 300);

          setProgress("Fetching SPY regime data…");
          const spyData = await fetchTimeSeries("SPY", 300);

          setProgress("Calculating signals…");
          const closes    = tickerData.map(d => parseFloat(d.close));
          const volumes   = tickerData.map(d => parseFloat(d.volume));
          const spyCloses = spyData.map(d => parseFloat(d.close));

          const momentum = calcMomentum(closes);
          const amihud   = calcAmihud(closes, volumes);
          const hmm      = calcHMM(spyCloses);
          const kelly    = calcKelly(closes);
          const cvar     = calcCVaR(closes);
          const signal   = generateSignal(momentum, amihud, hmm, kelly, cvar);

          setResult({
            ticker: ticker.toUpperCase(),
            price: closes[0],
            priceChange: (closes[0] - closes[1]) / closes[1],
            closes:    closes.slice(0, 60).reverse(),
            spyCloses: spyCloses.slice(0, 60).reverse(),
            momentum, amihud, hmm, kelly, cvar, signal,
            timestamp: new Date().toLocaleString()
          });
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false); setProgress("");
        }
      }, [ticker]);

      const R = result;

      return (
        <div style={{
          minHeight: "100vh", background: "#080808",
          backgroundImage: "radial-gradient(ellipse at 20% 0%, #001a0f 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, #0a0010 0%, transparent 60%)",
          color: "#c8c8c8", fontFamily: "'Courier New', monospace", padding: 0
        }}>

          {/* ── Header ── */}
          <div style={{
            borderBottom: "1px solid #1a1a1a", padding: "16px 32px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            background: "rgba(0,0,0,0.6)", position: "sticky", top: 0, zIndex: 100
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#00ff88", boxShadow: "0 0 8px #00ff88" }} />
              <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: 3, color: "#00ff88" }}>QUANT EDGE</span>
              <span style={{ fontSize: 10, color: "#333", letterSpacing: 2 }}>/ US EQUITY SWING SYSTEM</span>
            </div>
            <div style={{ fontSize: 10, color: "#333" }}>MOMENTUM · HMM · KELLY · CVAR</div>
          </div>

          <div style={{ maxWidth: 1000, margin: "0 auto", padding: "32px 24px" }}>

            {/* ── Input panel ── */}
            <div style={{ border: "1px solid #1c1c1c", borderRadius: 6, padding: 24, marginBottom: 28, background: "rgba(0,255,136,0.02)" }}>
              <div style={{ fontSize: 10, color: "#444", letterSpacing: 3, marginBottom: 16 }}>// CONFIGURATION</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 12, alignItems: "end" }}>
                <div>
                  <label style={{ fontSize: 10, color: "#555", letterSpacing: 2, display: "block", marginBottom: 6 }}>TICKER</label>
                  <input
                    value={ticker}
                    onChange={e => setTicker(e.target.value.toUpperCase())}
                    onKeyDown={e => e.key === "Enter" && analyze()}
                    placeholder="AAPL"
                    style={{
                      width: "100%", background: "#0d0d0d", border: "1px solid #2a2a2a",
                      borderRadius: 3, padding: "10px 12px", color: "#00ff88", fontSize: 14,
                      fontFamily: "monospace", fontWeight: 700, outline: "none", letterSpacing: 2
                    }}
                  />
                </div>
                <button
                  onClick={analyze} disabled={loading}
                  style={{
                    background: loading ? "#111" : "rgba(0,255,136,0.1)",
                    border: `1px solid ${loading ? "#222" : "#00ff88"}`,
                    color: loading ? "#333" : "#00ff88", borderRadius: 3,
                    padding: "10px 20px", fontSize: 11, letterSpacing: 2,
                    cursor: loading ? "not-allowed" : "pointer",
                    fontWeight: 700, whiteSpace: "nowrap", transition: "all 0.2s"
                  }}
                >
                  {loading ? "RUNNING…" : "▶ ANALYZE"}
                </button>
              </div>
              {progress && <div style={{ marginTop: 12, fontSize: 10, color: "#00ff88", opacity: 0.6 }}>◆ {progress}</div>}
              {error    && (
                <div style={{ marginTop: 12, fontSize: 11, color: "#ff6b6b", background: "rgba(255,107,107,0.05)", padding: "8px 12px", borderRadius: 3, border: "1px solid #ff6b6b22" }}>
                  ✗ {error}
                </div>
              )}
            </div>

            {/* ── Results ── */}
            {R && (
              <div>
                {/* Title row */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 20 }}>
                  <div>
                    <div style={{ fontSize: 32, fontWeight: 700, color: "#fff", letterSpacing: 2 }}>{R.ticker}</div>
                    <div style={{ fontSize: 13, color: R.priceChange >= 0 ? "#00ff88" : "#ff6b6b" }}>
                      ${R.price.toFixed(2)} · {R.priceChange >= 0 ? "▲" : "▼"} {pct(Math.abs(R.priceChange))}
                    </div>
                  </div>
                  {R.signal && (
                    <div style={{ border: `2px solid ${R.signal.color}`, borderRadius: 4, padding: "12px 24px", textAlign: "center", background: `${R.signal.color}11`, boxShadow: `0 0 20px ${R.signal.color}22` }}>
                      <div style={{ fontSize: 10, color: "#555", letterSpacing: 3, marginBottom: 4 }}>SIGNAL</div>
                      <div style={{ fontSize: 20, fontWeight: 700, color: R.signal.color, letterSpacing: 2 }}>{R.signal.signal}</div>
                      <div style={{ fontSize: 10, color: "#444", marginTop: 4 }}>score {R.signal.score}/{R.signal.maxScore}</div>
                    </div>
                  )}
                </div>

                {/* Sparklines */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
                  <div style={{ border: "1px solid #1a1a1a", borderRadius: 4, padding: "14px 16px", background: "rgba(0,0,0,0.3)" }}>
                    <div style={{ fontSize: 10, color: "#444", letterSpacing: 2, marginBottom: 8 }}>{R.ticker} · 60-DAY PRICE</div>
                    <SparkLine data={R.closes} color="#00ff88" height={50} />
                  </div>
                  <div style={{ border: "1px solid #1a1a1a", borderRadius: 4, padding: "14px 16px", background: "rgba(0,0,0,0.3)" }}>
                    <div style={{ fontSize: 10, color: "#444", letterSpacing: 2, marginBottom: 8 }}>SPY · 60-DAY (REGIME PROXY)</div>
                    <SparkLine data={R.spyCloses} color={R.hmm?.state === "RISK_ON" ? "#00ff88" : "#ff6b6b"} height={50} />
                  </div>
                </div>

                {/* Metric cards */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>
                  <MetricCard title="12-1 Momentum" value={R.momentum ? pct(R.momentum) : "N/A"} sub="past 12m excl. 1m"
                    color={R.momentum > 0.05 ? "#00ff88" : R.momentum > 0 ? "#ffd700" : "#ff6b6b"}
                    badge={R.momentum > 0 ? { text: "▲ POSITIVE", color: "#00ff88" } : { text: "▼ NEGATIVE", color: "#ff6b6b" }} />
                  <MetricCard title="Amihud Ratio" value={R.amihud ? R.amihud.toFixed(3) : "N/A"} sub="60-day avg illiquidity"
                    color={R.amihud < 0.5 ? "#00ff88" : R.amihud < 2.0 ? "#ffd700" : "#ff6b6b"}
                    badge={R.amihud < 0.5 ? { text: "HIGH LIQUIDITY", color: "#00ff88" } : { text: "LOW LIQUIDITY", color: "#ff6b6b" }} />
                  <MetricCard title="HMM Regime" value={R.hmm?.state || "N/A"}
                    sub={`conf. ${R.hmm ? pct(R.hmm.confidence) : "—"} · vol ${R.hmm ? pct(R.hmm.vol20) : "—"}`}
                    color={R.hmm?.state === "RISK_ON" ? "#00ff88" : "#ff6b6b"} />
                  <MetricCard title="Kelly f*" value={R.kelly ? pct(R.kelly.fAdj) : "N/A"}
                    sub={R.kelly ? `win ${pct(R.kelly.p)} · b=${R.kelly.b.toFixed(2)}` : "insufficient data"}
                    color={R.kelly && R.kelly.fAdj > 0.05 ? "#00ff88" : "#ffd700"}
                    badge={R.kelly ? { text: `γ=0.33 · raw f*=${pct(R.kelly.fStar)}`, color: "#444" } : null} />
                </div>

                {/* Risk + Signal breakdown */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
                  <div style={{ border: "1px solid #1c1c1c", borderRadius: 4, padding: 20, background: "rgba(0,0,0,0.3)" }}>
                    <div style={{ fontSize: 10, color: "#444", letterSpacing: 3, marginBottom: 16 }}>// RISK — CVaR DECOMPOSITION</div>
                    {R.cvar && (
                      <div>
                        <ProgressBar label="VaR (95%)"  value={pct(R.cvar.var95)} max={0.1} color={R.cvar.var95 < 0.02 ? "#00ff88" : "#ff6b6b"} />
                        <ProgressBar label="CVaR (95%)" value={pct(R.cvar.cvar)}  max={0.1} color={R.cvar.cvar  < 0.02 ? "#00ff88" : "#ff6b6b"} />
                        <div style={{ marginTop: 12, fontSize: 10, padding: "8px 12px", borderRadius: 3,
                          background: R.cvar.safe ? "rgba(0,255,136,0.05)" : "rgba(255,107,107,0.05)",
                          border: `1px solid ${R.cvar.safe ? "#00ff8822" : "#ff6b6b22"}`,
                          color: R.cvar.safe ? "#00ff88" : "#ff6b6b" }}>
                          {R.cvar.safe ? "✓ CVaR within 2% daily limit — position approved" : "⚠ CVaR exceeds 2% daily limit — reduce size"}
                        </div>
                        {R.kelly && (
                          <div style={{ marginTop: 12, fontSize: 11, color: "#555" }}>
                            Suggested allocation: <span style={{ color: "#ffd700" }}>{pct(Math.min(R.kelly.fAdj, 0.15))}</span> (capped at 15%)
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                  <div style={{ border: "1px solid #1c1c1c", borderRadius: 4, padding: 20, background: "rgba(0,0,0,0.3)" }}>
                    <div style={{ fontSize: 10, color: "#444", letterSpacing: 3, marginBottom: 16 }}>// ALPHA SCORE BREAKDOWN</div>
                    {R.signal?.factors.map((f, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid #111" }}>
                        <span style={{ fontSize: 11, color: "#666" }}>{f.label}</span>
                        <span style={{ fontSize: 11, color: f.color, fontWeight: 600 }}>{f.value}</span>
                      </div>
                    ))}
                    <div style={{ marginTop: 8, display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                      <span style={{ color: "#444" }}>TOTAL SCORE</span>
                      <span style={{ color: R.signal?.color, fontWeight: 700 }}>{R.signal?.score} / {R.signal?.maxScore}</span>
                    </div>
                  </div>
                </div>

                {/* HMM detail */}
                {R.hmm && (
                  <div style={{ border: "1px solid #1c1c1c", borderRadius: 4, padding: 20, background: "rgba(0,0,0,0.2)", marginBottom: 24 }}>
                    <div style={{ fontSize: 10, color: "#444", letterSpacing: 3, marginBottom: 12 }}>// HMM REGIME — SPY STATE DECOMPOSITION</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
                      {[
                        { label: "MA200",              value: R.hmm.ma200?.toFixed(2), color: "#888" },
                        { label: "MA50",               value: R.hmm.ma50?.toFixed(2),  color: "#888" },
                        { label: "Realized Vol (ann)", value: pct(R.hmm.vol20),         color: R.hmm.vol20 < 0.20 ? "#00ff88" : "#ff6b6b" },
                        { label: "State Confidence",   value: pct(R.hmm.confidence),    color: "#ffd700" },
                      ].map((m, i) => (
                        <div key={i} style={{ textAlign: "center", padding: "10px 0" }}>
                          <div style={{ fontSize: 10, color: "#444", marginBottom: 4 }}>{m.label}</div>
                          <div style={{ fontSize: 16, color: m.color, fontWeight: 700 }}>{m.value}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ marginTop: 12, fontSize: 10, color: "#333" }}>
                      Strategy: {R.hmm.state === "RISK_ON"
                        ? "Normal execution · Kelly sizing active · Momentum overlay ON"
                        : "Position reduction to 0.5× Kelly · No new entries · Monitor for recovery"}
                    </div>
                  </div>
                )}

                {/* Footer */}
                <div style={{ fontSize: 10, color: "#2a2a2a", textAlign: "center", paddingTop: 16, borderTop: "1px solid #111" }}>
                  QUANT EDGE v1.0 · Data: Twelve Data · Analyzed {R.timestamp} · NOT FINANCIAL ADVICE
                </div>
              </div>
            )}

            {/* Empty state */}
            {!R && !loading && (
              <div style={{ textAlign: "center", padding: "60px 0", color: "#2a2a2a" }}>
                <div style={{ fontSize: 40, marginBottom: 16 }}>◈</div>
                <div style={{ fontSize: 12, letterSpacing: 3 }}>ENTER A TICKER TO BEGIN</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<QuantDashboard />);
  </script>
</body>
</html>
