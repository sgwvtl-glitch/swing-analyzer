<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────
       Background   #090C12  surface   #0F1319  border  #1C2232
       Text         #B8C0CC  dim       #3D4557  muted   #5C6880
       Blue (buy)   #4D8FD6  lt-blue   #7AAEE0
       Teal (pos)   #3BB58A
       Amber (hold) #D4A84B
       Orange(redu) #C07840
       Red  (sell)  #C75C5C
    ─────────────────────────────────────────────────────────────── */
    :root {
      --bg:       #090C12;
      --surface:  #111620;
      --surface2: #161C28;
      --border:   #1C2232;
      --border2:  #242C3E;
      --text:     #E2E7EF;
      --text-dim: #9BA8BC;
      --text-mid: #B0BBC9;
      --blue:     #4D8FD6;
      --blue-lt:  #7AAEE0;
      --teal:     #3BB58A;
      --amber:    #D4A84B;
      --orange:   #C07840;
      --red:      #C75C5C;
      --red-lt:   #D47070;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:15px;}
    input,button{font-family:'Courier New',monospace;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .fade{animation:fadeUp .35s ease forwards}
    /* scrollbar */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    /* table row hover */

    /* mobile base */
    @media(max-width:600px){
      body{font-size:13px;}
      input{font-size:16px!important;} /* prevent iOS zoom */
    }
  </style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect,useRef}=React;
/* ── responsive hook ─────────────────────────────────── */
function useIsMobile(bp=640){
  const [mobile,setMobile]=useState(typeof window!=="undefined"&&window.innerWidth<bp);
  useEffect(()=>{
    const h=()=>setMobile(window.innerWidth<bp);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[bp]);
  return mobile;
}

/* ── palette helpers ─────────────────────────────────────── */
const C={
  buy:    "#4D8FD6",
  buyLt:  "#7AAEE0",
  teal:   "#3BB58A",
  amber:  "#D4A84B",
  orange: "#C07840",
  red:    "#C75C5C",
  redLt:  "#D47070",
  text:   "#B8C0CC",
  mid:    "#5C6880",
  dim:    "#3D4557",
};
const signalColor=a=>({BUY:C.teal,HOLD:C.amber,REDUCE:C.orange,SELL:C.red,"NO TRADE":C.mid})[a]||C.mid;
const riskColor  =r=>({LOW:C.teal,MEDIUM:C.amber,HIGH:C.orange,EXTREME:C.red})[r];

/* ── math utils ─────────────────────────────────────────── */
const mean  =a=>a.reduce((s,v)=>s+v,0)/a.length;
const std   =a=>{const m=mean(a);return Math.sqrt(mean(a.map(x=>(x-m)**2)));};
const pct   =(v,d=1)=>`${(v*100).toFixed(d)}%`;
const clamp =(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const fmt$  =v=>`$${v.toFixed(2)}`;

/* ── quant calculations — tuned for 1-day to 2-week hold ─── */

// ATR(14) — Average True Range, proper measure of daily volatility
function calcATR(c,h,l,period=14){
  if(c.length<period+1)return null;
  const trs=[];
  for(let i=0;i<period;i++){
    const hl=h[i]-l[i];
    const hc=Math.abs(h[i]-c[i+1]);
    const lc=Math.abs(l[i]-c[i+1]);
    trs.push(Math.max(hl,hc,lc));
  }
  return mean(trs);
}

// Short-term momentum (5d, 10d) — core signals for 1-2 week holding
function calcMomentum(c){
  if(c.length<22)return null;
  const mom5d  =(c[0]-c[5])/c[5];          // 1-week momentum
  const mom10d =(c[0]-c[10])/c[10];         // 2-week momentum
  const mom20d =(c[0]-c[20])/c[20];         // 1-month momentum (trend filter)
  // Rate of change acceleration: is 5d stronger than 10d?
  const accel  = mom5d - (mom10d/2);        // positive = accelerating
  return{mom5d,mom10d,mom20d,accel};
}

// Amihud illiquidity — use 20d window for swing trading
function calcAmihud(c,v){
  const n=Math.min(20,c.length-1),r=[];
  for(let i=0;i<n;i++){const dv=v[i]*c[i];if(dv>0)r.push(Math.abs((c[i]-c[i+1])/c[i+1])/dv);}
  return mean(r)*1e9;
}

// MA trend — use short MAs relevant to 1-2 week holds
function calcTrend(c){
  if(c.length<50)return null;
  const ma5  =mean(c.slice(0,5));
  const ma10 =mean(c.slice(0,10));
  const ma20 =mean(c.slice(0,20));
  const ma50 =mean(c.slice(0,50));
  const ma200=c.length>=200?mean(c.slice(0,200)):null;
  const p=c[0];
  // Slope of MA10 over last 3 days (trend direction)
  const ma10_3dAgo=mean(c.slice(3,13));
  const ma10slope=(ma10-ma10_3dAgo)/ma10_3dAgo;
  return{ma5,ma10,ma20,ma50,ma200,
    aboveMa5:p>ma5, aboveMa10:p>ma10,
    aboveMa20:p>ma20, aboveMa50:p>ma50,
    aboveMa200:ma200?p>ma200:null,
    ma10slope,                              // positive = uptrend
    trendAligned:p>ma10&&p>ma20&&ma10>ma20, // short-term stack
  };
}

// RSI(7) — more responsive for short-term entries vs RSI(14)
function calcRSI(c,per=7){
  if(c.length<per+1)return null;
  const ch=c.slice(0,per+1).map((p,i,a)=>i<per?p-a[i+1]:null).filter(v=>v!==null);
  const ag=mean(ch.map(x=>x>0?x:0)),al=mean(ch.map(x=>x<0?-x:0));
  return al===0?100:100-100/(1+ag/al);
}

// Volume surge — high volume confirms breakout/breakdown
function calcVolume(v,c){
  if(v.length<21)return null;
  const avgVol=mean(v.slice(1,21));         // 20d avg (exclude today)
  const todayVol=v[0];
  const ratio=todayVol/avgVol;
  const dollarVol=todayVol*c[0];
  return{ratio,avgVol,todayVol,dollarVol,surge:ratio>1.5};
}

// SPY HMM regime — 2-state, use shorter vol window for swing trading
function calcHMM(s){
  if(s.length<50)return{state:"unknown",confidence:0};
  const ma50 =mean(s.slice(0,50));
  const ma20 =mean(s.slice(0,20));
  const ma200=s.length>=200?mean(s.slice(0,200)):null;
  const p=s[0];
  const rets=s.slice(0,11).map((v,i,a)=>i<10?(v-a[i+1])/a[i+1]:null).filter(Boolean);
  const vol10=std(rets)*Math.sqrt(252);     // 10-day vol — more responsive
  let state,conf,label;
  if(p>ma50&&p>ma20&&vol10<0.20)            {state="BULL";       conf=.86;label="Risk-On";}
  else if((!ma200||p<ma200)&&p<ma50&&vol10>.30){state="BEAR";    conf=.85;label="Risk-Off";}
  else if(p>ma50&&vol10>.25)                {state="TRANSITION"; conf=.62;label="Elevated Vol";}
  else if(p<ma50&&p>ma20)                   {state="TRANSITION"; conf=.58;label="Caution";}
  else                                      {state="TRANSITION"; conf=.55;label="Mixed";}
  return{state,conf,label,ma20,ma50,ma200,vol:vol10};
}

// Kelly — calibrated on 10-day forward returns (matches 2-week hold target)
function calcKelly(c){
  if(c.length<120)return null;
  const fwd=[];
  // Use all available 10d windows in past ~100 days
  for(let i=20;i<Math.min(c.length-10,120);i++)fwd.push((c[i-10]-c[i])/c[i]);
  const w=fwd.filter(r=>r>0),l=fwd.filter(r=>r<0);
  if(!w.length||!l.length)return null;
  const p=w.length/fwd.length,q=1-p,b=mean(w)/Math.abs(mean(l));
  const fStar=(p*b-q)/b;
  return{p,q,b,fStar,fAdj:Math.max(0,.33*fStar),horizon:"10-day"};
}

// CVaR — use 30d window for swing trading tail risk
function calcCVaR(c){
  if(c.length<32)return null;
  const rets=c.slice(0,31).map((p,i,a)=>i<30?(p-a[i+1])/a[i+1]:null).filter(Boolean);
  rets.sort((a,b)=>a-b);
  const cut=Math.floor(rets.length*.05);
  const cvar=Math.abs(mean(rets.slice(0,cut+1))),var95=Math.abs(rets[cut]);
  // Also compute 5-day max drawdown as swing-specific risk metric
  const dd5=Math.abs(Math.min(...c.slice(0,5).map((v,i,a)=>i>0?(v-a[0])/a[0]:0)));
  return{cvar,var95,annVol:std(rets)*Math.sqrt(252),safe:cvar<.030,dd5};
}

/* ── 1h quant calculations ───────────────────────────────── */

// 1h momentum: last 4h (half-day), 12h (overnight), 24h (full day)
function calcMomentum1h(hc){
  if(!hc||hc.length<25)return null;
  const mom4h  =(hc[0]-hc[4])/hc[4];
  const mom12h =(hc[0]-hc[12])/hc[12];
  const mom24h =(hc[0]-hc[24])/hc[24];
  // Intraday trend: MA5h vs MA20h
  const ma5h =mean(hc.slice(0,5));
  const ma20h=mean(hc.slice(0,20));
  const trendUp=hc[0]>ma5h&&ma5h>ma20h;
  const trendDn=hc[0]<ma5h&&ma5h<ma20h;
  return{mom4h,mom12h,mom24h,ma5h,ma20h,trendUp,trendDn};
}

// 1h RSI(7) — faster signal for entry timing
function calcRSI1h(hc,per=7){
  if(!hc||hc.length<per+1)return null;
  const ch=hc.slice(0,per+1).map((p,i,a)=>i<per?p-a[i+1]:null).filter(v=>v!==null);
  const ag=mean(ch.map(x=>x>0?x:0)),al=mean(ch.map(x=>x<0?-x:0));
  return al===0?100:100-100/(1+ag/al);
}

// 1h volume: compare last bar vs 20h avg — detects intraday surges
function calcVol1h(hD){
  if(!hD||hD.length<21)return null;
  const hv=hD.map(d=>parseFloat(d.volume||0));
  const hc=hD.map(d=>parseFloat(d.close));
  const avg20h=mean(hv.slice(1,21));
  const ratio=avg20h>0?hv[0]/avg20h:1;
  return{ratio,surge:ratio>1.8, priceUp:hc[0]>hc[1]};
}


/* ── Price Action calculations ───────────────────────────
   Uses OHLC daily data. Detects:
   1. Candlestick patterns (last 2 bars)
   2. Breakout vs 20-day range
   3. Pivot S/R levels
   4. HH/LL trend structure (swing highs/lows)
─────────────────────────────────────────────────────────── */
function calcPriceAction(c,h,l,o){
  if(!o||c.length<22||h.length<22||l.length<22||o.length<22) return null;

  const price=c[0];
  const bodySize   =i=> Math.abs(c[i]-o[i]);
  const candleRange=i=> h[i]-l[i];
  const isGreen    =i=> c[i]>o[i];
  const upperWick  =i=> h[i]-Math.max(c[i],o[i]);
  const lowerWick  =i=> Math.min(c[i],o[i])-l[i];

  // ── Candlestick Patterns ─────────────────────────────
  const patterns=[];

  // Bullish Engulfing: today green body fully wraps yesterday red body
  if(!isGreen(1)&&isGreen(0)&&o[0]<=c[1]&&c[0]>=o[1]&&bodySize(0)>bodySize(1)*1.1)
    patterns.push({name:"Bullish Engulfing",bias:1,strength:"strong"});

  // Bearish Engulfing: today red body fully wraps yesterday green body
  if(isGreen(1)&&!isGreen(0)&&o[0]>=c[1]&&c[0]<=o[1]&&bodySize(0)>bodySize(1)*1.1)
    patterns.push({name:"Bearish Engulfing",bias:-1,strength:"strong"});

  // Hammer: small body at top, long lower wick (≥2× body), tiny upper wick
  if(lowerWick(0)>=bodySize(0)*2&&upperWick(0)<=bodySize(0)*0.4&&candleRange(0)>0)
    patterns.push({name:"Hammer",bias:1,strength:"moderate"});

  // Shooting Star: small body at bottom, long upper wick (≥2× body)
  if(upperWick(0)>=bodySize(0)*2&&lowerWick(0)<=bodySize(0)*0.4&&candleRange(0)>0)
    patterns.push({name:"Shooting Star",bias:-1,strength:"moderate"});

  // Doji: body < 10% of range — indecision
  if(bodySize(0)<candleRange(0)*0.1&&candleRange(0)>0)
    patterns.push({name:"Doji",bias:0,strength:"weak"});

  // Bullish Harami: yesterday big red, today small green inside it
  if(!isGreen(1)&&isGreen(0)&&o[0]>c[1]&&c[0]<o[1]&&bodySize(0)<bodySize(1)*0.5)
    patterns.push({name:"Bullish Harami",bias:1,strength:"moderate"});

  // Bearish Harami: yesterday big green, today small red inside it
  if(isGreen(1)&&!isGreen(0)&&o[0]<c[1]&&c[0]>o[1]&&bodySize(0)<bodySize(1)*0.5)
    patterns.push({name:"Bearish Harami",bias:-1,strength:"moderate"});

  // Morning Star (3-bar): big red, small body gap, big green
  if(c.length>=3&&!isGreen(2)&&bodySize(1)<bodySize(2)*0.4&&isGreen(0)&&c[0]>o[2])
    patterns.push({name:"Morning Star",bias:1,strength:"strong"});

  // Evening Star (3-bar): big green, small body, big red
  if(c.length>=3&&isGreen(2)&&bodySize(1)<bodySize(2)*0.4&&!isGreen(0)&&c[0]<o[2])
    patterns.push({name:"Evening Star",bias:-1,strength:"strong"});

  // ── Breakout Detection ───────────────────────────────
  const hi20=Math.max(...h.slice(1,21));  // exclude today
  const lo20=Math.min(...l.slice(1,21));
  const hi5 =Math.max(...h.slice(1,6));
  const lo5 =Math.min(...l.slice(1,6));
  const rangeWidth=(hi20-lo20)/lo20;

  const breakout20dHigh = price>hi20;
  const breakout20dLow  = price<lo20;
  const breakout5dHigh  = price>hi5&&!breakout20dHigh;
  const nearResistance  = (hi20-price)/price<0.015&&!breakout20dHigh; // within 1.5%
  const nearSupport     = (price-lo20)/price<0.015&&!breakout20dLow;

  // ── Pivot S/R (last 20 days, look for swing highs/lows) ──
  const pivotHighs=[], pivotLows=[];
  for(let i=2;i<Math.min(20,h.length-2);i++){
    if(h[i]>h[i-1]&&h[i]>h[i+1]&&h[i]>h[i-2]&&h[i]>h[i+2])
      pivotHighs.push(h[i]);
    if(l[i]<l[i-1]&&l[i]<l[i+1]&&l[i]<l[i-2]&&l[i]<l[i+2])
      pivotLows.push(l[i]);
  }
  // Nearest resistance above and support below current price
  const resistances=pivotHighs.filter(p=>p>price).sort((a,b)=>a-b);
  const supports   =pivotLows.filter(p=>p<price).sort((a,b)=>b-a);
  const nearestRes =resistances[0]||null;
  const nearestSup =supports[0]||null;
  const distToRes  =nearestRes?(nearestRes-price)/price:null;
  const distToSup  =nearestSup?(price-nearestSup)/price:null;

  // ── HH/LL Trend Structure (swing highs/lows over 10 days) ──
  const highs10=h.slice(0,10), lows10=l.slice(0,10);
  const recentHigh=Math.max(...highs10.slice(0,5));
  const prevHigh  =Math.max(...highs10.slice(5,10));
  const recentLow =Math.min(...lows10.slice(0,5));
  const prevLow   =Math.min(...lows10.slice(5,10));
  const hhll = recentHigh>prevHigh&&recentLow>prevLow ? "HH+HL"   // uptrend structure
             : recentHigh<prevHigh&&recentLow<prevLow ? "LH+LL"   // downtrend structure
             : recentHigh>prevHigh&&recentLow<prevLow ? "HH+LL"   // expansion
             : "LH+HL";                                            // contraction

  // ── Consolidated PA bias ─────────────────────────────
  const patternBias=patterns.reduce((s,p)=>s+p.bias*(p.strength==="strong"?2:1),0);

  return{
    patterns, patternBias,
    breakout20dHigh, breakout20dLow, breakout5dHigh,
    nearResistance, nearSupport,
    hi20, lo20, hi5, lo5, rangeWidth,
    nearestRes, nearestSup, distToRes, distToSup,
    hhll
  };
}

/* ── signal engine — 1-day to 2-week swing framework ────── */
function buildSignal(price,atr,mom,amihud,trend,rsi,vol,hmm,kelly,cvar,mom1h,rsi1h,vol1h,pa){
  if(!mom||!kelly||!cvar||!hmm||!trend)return null;
  let score=0;const notes=[];
  const{mom5d,mom10d,mom20d,accel}=mom;

  // 1. SPY Regime gate (critical filter — always applied first)
  if(hmm.state==="BULL")             score+=3;
  else if(hmm.state==="TRANSITION") {score+=1;notes.push("Market in transition — reduce size, higher bar for entry");}
  else                              {score-=4;notes.push("Bear regime — only high-conviction setups qualify");}

  // 2. Short-term momentum (5d) — primary swing signal
  if(mom5d>.04)       {score+=2;notes.push(`Strong 5-day momentum +${pct(mom5d)} — trend continuation`);}
  else if(mom5d>.015)  score+=1;
  else if(mom5d<-.04) {score-=2;notes.push(`Negative 5-day momentum ${pct(mom5d)} — avoid long entry`);}
  else if(mom5d<-.015) score-=1;

  // 3. Momentum acceleration (5d vs 10d) — signals near-term thrust
  if(accel>.02)        {score+=1;notes.push("Momentum accelerating — short-term thrust confirmed");}
  else if(accel<-.02)  {score-=1;notes.push("Momentum decelerating — potential near-term fade");}

  // 4. Short-term MA stack (MA5 > MA10 > MA20) — swing trend structure
  if(trend.trendAligned&&trend.ma10slope>0)       score+=2;
  else if(trend.aboveMa10&&trend.aboveMa20)        score+=1;
  else if(!trend.aboveMa10&&!trend.aboveMa20)     {score-=2;notes.push("Price below MA10 and MA20 — short-term downtrend");}
  else                                             score-=1;

  // 5. RSI(7) — short-period RSI for swing timing
  if(rsi!==null){
    if(rsi<25)      {score+=2;notes.push(`RSI(7) deeply oversold at ${rsi.toFixed(0)} — high bounce probability`);}
    else if(rsi<40) {score+=1;notes.push(`RSI(7) oversold at ${rsi.toFixed(0)} — pullback entry opportunity`);}
    else if(rsi>80) {score-=2;notes.push(`RSI(7) overbought at ${rsi.toFixed(0)} — wait for consolidation`);}
    else if(rsi>65)  score-=1;
    else if(rsi>45)  score+=1;
  }

  // 6. Volume confirmation — surge on up-day validates breakout
  if(vol){
    const priceUp=mom5d>0;
    if(vol.surge&&priceUp)  {score+=1;notes.push(`Volume surge ${vol.ratio.toFixed(1)}× avg — institutional buying confirmed`);}
    if(vol.surge&&!priceUp) {score-=1;notes.push(`Volume surge on down-move — distribution signal`);}
  }

  // 7. 1h momentum confirmation — intraday alignment with daily signal
  if(mom1h){
    if(mom1h.trendUp&&mom1h.mom4h>.01)  {score+=1;notes.push(`1h trend aligned: +${pct(mom1h.mom4h,1)} past 4h — intraday confirmation`);}
    if(mom1h.trendDn&&mom1h.mom4h<-.01) {score-=1;notes.push(`1h trend bearish: ${pct(mom1h.mom4h,1)} past 4h — wait for reversal`);}
  }

  // 8. 1h RSI entry timing — avoid chasing overbought on hourly
  if(rsi1h!==null){
    if(rsi1h<25)      {score+=1;notes.push(`1h RSI oversold at ${rsi1h.toFixed(0)} — intraday entry timing favourable`);}
    else if(rsi1h>80) {score-=1;notes.push(`1h RSI overbought at ${rsi1h.toFixed(0)} — wait for hourly pullback`);}
  }

  // 9. 1h volume surge — intraday institutional activity
  if(vol1h){
    if(vol1h.surge&&vol1h.priceUp)  {score+=1;notes.push(`1h volume surge ${vol1h.ratio.toFixed(1)}× avg on uptick — intraday buying pressure`);}
    if(vol1h.surge&&!vol1h.priceUp) {score-=1;notes.push(`1h volume surge on downtick — intraday distribution signal`);}
  }

  // 10. Liquidity filter (same — critical for execution)
  if(amihud>5)        {score-=2;notes.push("Low liquidity — high slippage, widen stops or skip");}
  else if(amihud<.5)   score+=1;

  // 11. CVaR tail risk check
  if(!cvar.safe)      {score-=1;notes.push(`Tail risk elevated: CVaR(95%) = ${pct(cvar.cvar)} — reduce size`);}

  // 12. Price Action — patterns, breakout, structure
  if(pa){
    // Candlestick pattern bias
    if(pa.patternBias>=2)       {score+=2;notes.push(`PA: ${pa.patterns.map(p=>p.name).join(" + ")} — strong bullish signal`);}
    else if(pa.patternBias===1) {score+=1;notes.push(`PA: ${pa.patterns.map(p=>p.name).join(" + ")} — bullish pattern`);}
    else if(pa.patternBias<=-2) {score-=2;notes.push(`PA: ${pa.patterns.map(p=>p.name).join(" + ")} — strong bearish signal`);}
    else if(pa.patternBias===-1){score-=1;notes.push(`PA: ${pa.patterns.map(p=>p.name).join(" + ")} — bearish pattern`);}
    // Breakout
    if(pa.breakout20dHigh)      {score+=2;notes.push(`PA: Breakout above 20-day high $${pa.hi20.toFixed(2)} — momentum breakout`);}
    else if(pa.breakout5dHigh)  {score+=1;notes.push(`PA: Breaking above 5-day high $${pa.hi5.toFixed(2)}`);}
    if(pa.breakout20dLow)       {score-=2;notes.push(`PA: Breakdown below 20-day low $${pa.lo20.toFixed(2)} — bearish breakdown`);}
    // Near resistance — trim / caution
    if(pa.nearResistance&&pa.distToRes!==null)
      notes.push(`PA: Near 20-day resistance $${pa.nearestRes?.toFixed(2)} (+${pct(pa.distToRes,1)}) — consider partial exit`);
    if(pa.nearSupport&&pa.distToSup!==null)
      notes.push(`PA: Near 20-day support $${pa.nearestSup?.toFixed(2)} — good risk/reward entry zone`);
    // HH/HL trend structure
    if(pa.hhll==="HH+HL")       score+=1;
    else if(pa.hhll==="LH+LL")  score-=1;
  }

  // ── Action determination ─────────────────────────────────
  let action,direction;
  if(hmm.state==="BEAR"&&score<-3) {action="SELL";  direction="FLAT";}
  else if(hmm.state==="BEAR")      {action="REDUCE"; direction="FLAT";}
  else if(score>=8)                {action="BUY";    direction="LONG";}
  else if(score>=5)                {action="BUY";    direction="LONG";}
  else if(score>=2)                {action="HOLD";   direction="LONG";}
  else if(score>=-1)               {action="HOLD";   direction="FLAT";}
  else                             {action="REDUCE";  direction="FLAT";}

  // ── Risk level (swing-appropriate thresholds) ─────────────
  const v=cvar.annVol;
  const risk=v<.22&&hmm.state==="BULL"&&amihud<1?"LOW"
            :v<.35&&hmm.state!=="BEAR"?"MEDIUM"
            :v<.55?"HIGH":"EXTREME";

  // ── Position size ────────────────────────────────────────
  const regM={BULL:1,TRANSITION:.5,BEAR:0}[hmm.state]??0;
  const rkM ={LOW:1,MEDIUM:.75,HIGH:.5,EXTREME:.25}[risk];
  const acM ={BUY:1,HOLD:.6,REDUCE:.2,SELL:0}[action]??0;
  const size=clamp(Math.round(kelly.fAdj*regM*rkM*acM*1000)/10,0,15);

  // ── ATR-based trade levels (proper ATR, not CVaR proxy) ──
  // For 1-2 week swing: stop=1.5× ATR, target=3× ATR (2:1 R/R)
  const atrVal = atr || cvar.var95*price;
  const stopDist  = atrVal*1.5;
  const targetDist= atrVal*3.0;
  const stop  = price - stopDist;
  const target= price + targetDist;
  const rr    = targetDist/stopDist;             // always 2.0 with 1.5/3.0
  const stopPct   = stopDist/price;
  const targetPct = targetDist/price;
  // Max holding period hint
  const holdDays = `1–10 days`;

  const aColor=signalColor(action);
  const rColor=riskColor(risk);

  return{
    action,direction,risk,rColor,aColor,size,
    stop,target,rr,stopPct,targetPct,holdDays,
    score,maxScore:22,notes,kelly,hmm,cvar,trend,rsi,vol,
    mom5d,mom10d,mom20d,accel,amihud,mom1h,rsi1h,vol1h,pa,
    factors:[
      {label:"SPY Regime",         value:hmm.label,                color:hmm.state==="BULL"?C.teal:hmm.state==="BEAR"?C.red:C.amber},
      {label:"5D Momentum",        value:pct(mom5d),               color:mom5d>.015?C.teal:mom5d>0?C.amber:C.red},
      {label:"10D Momentum",       value:pct(mom10d),              color:mom10d>.02?C.teal:mom10d>0?C.amber:C.red},
      {label:"MA Stack (daily)",   value:trend.trendAligned?"Aligned":"Broken", color:trend.trendAligned?C.teal:C.red},
      {label:"RSI-7 (daily)",      value:rsi?rsi.toFixed(1):"—",   color:rsi<40?C.teal:rsi>65?C.red:C.amber},
      {label:"Volume (daily)",     value:vol?`${vol.ratio.toFixed(1)}×`:"—",   color:vol?.surge&&mom5d>0?C.teal:vol?.surge&&mom5d<0?C.red:C.amber},
      {label:"1h Momentum (4h)",   value:mom1h?pct(mom1h.mom4h):"—", color:mom1h?.mom4h>.01?C.teal:mom1h?.mom4h<-.01?C.red:C.amber},
      {label:"1h MA Trend",        value:mom1h?mom1h.trendUp?"↑ Bullish":mom1h.trendDn?"↓ Bearish":"→ Neutral":"—", color:mom1h?.trendUp?C.teal:mom1h?.trendDn?C.red:C.amber},
      {label:"1h RSI-7",           value:rsi1h!==null?rsi1h.toFixed(1):"—", color:rsi1h<25?C.teal:rsi1h>80?C.red:C.amber},
      {label:"1h Volume",          value:vol1h?`${vol1h.ratio.toFixed(1)}×`:"—", color:vol1h?.surge&&vol1h?.priceUp?C.teal:vol1h?.surge&&!vol1h?.priceUp?C.red:C.amber},
      {label:"Liquidity",          value:amihud<.5?"High":amihud<2?"Medium":"Low", color:amihud<.5?C.teal:amihud<2?C.amber:C.red},
      {label:"CVaR (95%)",         value:pct(cvar.cvar),           color:cvar.safe?C.teal:C.red},
      {label:"Candle Pattern",     value:pa?.patterns?.length>0?pa.patterns[0].name:"No pattern", color:pa?.patternBias>0?C.teal:pa?.patternBias<0?C.red:C.mid},

      {label:"Trend Structure",    value:pa?.hhll||"—",            color:pa?.hhll==="HH+HL"?C.teal:pa?.hhll==="LH+LL"?C.red:C.amber},

      {label:"Nearest Support",    value:pa?.nearestSup?`$${pa.nearestSup.toFixed(2)}`:"—", color:pa?.nearSupport?C.teal:C.mid},
    ]
  };
}

/* ── API — Batch Mode ────────────────────────────────────
   Call 1: daily data for ticker+SPY in one request (multi-symbol)
   Call 2: 1h data for ticker only
   Total: 2 API calls instead of 3, using Promise.all
──────────────────────────────────────────────────────── */
const KEY="934f233f1c934c92a767bb9e52191d6d";
const BASE="https://api.twelvedata.com/time_series";

// Multi-symbol daily batch: returns {TICKER:{values}, SPY:{values}}
async function fetchDailyBatch(sym,n=300){
  const url=`${BASE}?symbol=${sym},SPY&interval=1day&outputsize=${n}&apikey=${KEY}&dp=4`;
  const d=await(await fetch(url)).json();
  // If only one symbol returned, d.values exists directly
  const tickerD = d[sym]||d;
  const spyD    = d["SPY"]||{};
  if(tickerD.status==="error") throw new Error(tickerD.message||"Fetch error: "+sym);
  if(!tickerD.values?.length)  throw new Error("No daily data: "+sym);
  if(!spyD.values?.length)     throw new Error("No daily data: SPY");
  return{ticker:tickerD.values, spy:spyD.values};
}

// 1-hour data for ticker only — ~80 bars ≈ 2 weeks of trading hours
async function fetch1h(sym,n=80){
  const url=`${BASE}?symbol=${sym}&interval=1h&outputsize=${n}&apikey=${KEY}&dp=4`;
  const d=await(await fetch(url)).json();
  if(d.status==="error") throw new Error(d.message);
  if(!d.values?.length)  throw new Error("No 1h data: "+sym);
  return d.values;
}

// Combined batch fetch: 2 parallel requests → 3 datasets
async function fetchAll(sym){
  const [daily,hourly]=await Promise.all([
    fetchDailyBatch(sym,300),
    fetch1h(sym,80)
  ]);
  return{
    tickerDaily: daily.ticker,
    spyDaily:    daily.spy,
    tickerHourly:hourly
  };
}

// ── Heikin-Ashi calculator ──────────────────────────────────────────
// Input: arrays newest-first; returns HA bars array oldest-first for chart
function calcHA(c,h,l,o){
  if(!c||!h||!l||!o||c.length<2) return [];
  // Reverse to chronological order (oldest first)
  const C2=[...c].reverse(), H2=[...h].reverse(), L2=[...l].reverse(), O2=[...o].reverse();
  const bars=[];
  for(let i=0;i<C2.length;i++){
    const haC=(O2[i]+H2[i]+L2[i]+C2[i])/4;
    const haO= i===0 ? (O2[i]+C2[i])/2 : (bars[i-1].o+bars[i-1].c)/2;
    const haH= Math.max(H2[i],haO,haC);
    const haL= Math.min(L2[i],haO,haC);
    bars.push({o:haO,h:haH,l:haL,c:haC,bull:haC>=haO});
  }
  return bars; // chronological order, newest at end
}

// ── Heikin-Ashi candlestick chart ───────────────────────────────────
const HAChart=({bars,h=90,bullColor,bearColor,label})=>{
  if(!bars||bars.length<2) return null;
  const bull = bullColor||C.teal;
  const bear = bearColor||C.red;
  const W=300;
  const allHi=bars.map(b=>b.h), allLo=bars.map(b=>b.l);
  const hi=Math.max(...allHi), lo=Math.min(...allLo), rng=hi-lo||1;
  const pad=4;
  const toY=v=>pad+(h-2*pad)*(1-(v-lo)/rng);
  const n=bars.length;
  // candle width with tiny gap
  const cw=Math.max(1, W/n - 1);
  const cx=i=>(i+0.5)*(W/n);

  return(
    <svg width="100%" viewBox={`0 0 ${W} ${h}`} preserveAspectRatio="none"
      style={{display:"block",overflow:"visible"}}>
      {bars.map((b,i)=>{
        const x=cx(i), color=b.bull?bull:bear;
        const bodyTop=toY(Math.max(b.o,b.c));
        const bodyBot=toY(Math.min(b.o,b.c));
        const bodyH=Math.max(1,bodyBot-bodyTop);
        const wickX=x;
        return(
          <g key={i}>
            {/* wick */}
            <line x1={wickX} y1={toY(b.h)} x2={wickX} y2={toY(b.l)}
              stroke={color} strokeWidth="0.8" opacity="0.7"/>
            {/* body */}
            <rect x={x-cw/2} y={bodyTop} width={cw} height={bodyH}
              fill={color} opacity="0.85"/>
          </g>
        );
      })}
    </svg>
  );
};

// ── Simple sparkline (kept for SPY proxy) ───────────────────────────
const Spark=({data,color,h=50})=>{
  if(!data||data.length<2)return null;
  const lo=Math.min(...data),hi=Math.max(...data),rng=hi-lo||1,W=200;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${h-((v-lo)/rng)*(h-4)-2}`).join(" ");
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${h}`} preserveAspectRatio="none" style={{display:"block"}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" opacity=".9"/>
    </svg>
  );
};

          )}
        </Card>

        {/* ── RESULTS ── */}
        {R&&S&&(
          <div className="fade">

            {/* ── IDENTITY ROW ── */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:isMobile?12:14,color:"var(--text-dim)",letterSpacing:1.5,marginBottom:5,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                <span>US EQUITY · SWING 1D–2W</span>
                {!isMobile&&countdown!==null&&(
                  <span style={{fontSize:11,color:countdown<=15?C.amber:"var(--text-dim)",
                    background:"var(--surface2)",border:"1px solid var(--border)",
                    borderRadius:3,padding:"2px 8px",letterSpacing:1.5}}>
                    AUTO-REFRESH {countdown}s
                  </span>
                )}
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:isMobile?8:14,flexWrap:"wrap"}}>
                <span style={{fontSize:isMobile?28:36,fontWeight:700,color:"var(--text)",letterSpacing:2}}>{R.ticker}</span>
                <span style={{fontSize:isMobile?16:20,color:"var(--text-mid)"}}>{fmt$(R.price)}</span>
                <span style={{fontSize:isMobile?13:15,color:R.chg>=0?C.teal:C.red}}>
                  {R.chg>=0?"▲":"▼"} {pct(Math.abs(R.chg))} today
                </span>
              </div>
              <div style={{fontSize:11,color:"var(--text-dim)",marginTop:4}}>{R.ts}</div>
            </div>

            {/* ── SIGNAL BANNER ── */}
            <div style={{border:`1px solid ${S.aColor}30`,borderRadius:5,
              background:`${S.aColor}07`,marginBottom:18,overflow:"hidden"}}>
              {/* top accent line */}
              <div style={{height:2,background:S.aColor,opacity:.6}}/>
              <div style={{display:"grid",
                gridTemplateColumns:isMobile?"1fr 1fr":"auto 1px 1fr 1px 1fr 1px 1fr",
                gap:isMobile?"1px 0":0,alignItems:"center",
                padding:isMobile?"16px":"20px 28px"}}>

                {/* Action */}
                <div style={{textAlign:"center",paddingRight:isMobile?0:28,
                  paddingBottom:isMobile?16:0,
                  borderBottom:isMobile?"1px solid var(--border)":"none",
                  gridColumn:isMobile?"1/2":"auto"}}>
                  <Label>Signal</Label>
                  <BigNum value={S.action} color={S.aColor} size={32}/>
                  <div style={{fontSize:11,color:"var(--text-dim)",marginTop:5,letterSpacing:2}}>{S.direction}</div>
                </div>

                {!isMobile&&<Divider/>}

                {/* Score */}
                <div style={{padding:isMobile?"0":"0 28px",textAlign:"center",
                  paddingBottom:isMobile?16:0,
                  borderBottom:isMobile?"1px solid var(--border)":"none",
                  gridColumn:isMobile?"2/3":"auto"}}>
                  <Label>Composite Score</Label>
                  <div style={{display:"flex",alignItems:"baseline",justifyContent:"center",gap:4}}>
                    <span style={{fontSize:32,fontWeight:700,color:S.aColor}}>{S.score}</span>
                    <span style={{fontSize:15,color:"var(--text-dim)"}}>/ {S.maxScore}</span>
                  </div>
                  <div style={{height:3,background:"var(--border)",borderRadius:2,marginTop:10}}>
                    <div style={{height:"100%",borderRadius:2,background:S.aColor,
                      width:`${clamp((S.score/S.maxScore)*100,0,100)}%`,
                      transition:"width 1s ease"}}/>
                  </div>
                </div>

                {!isMobile&&<Divider/>}

                {/* Risk */}
                <div style={{padding:isMobile?"0":"0 28px",textAlign:"center",
                  paddingTop:isMobile?16:0,
                  gridColumn:isMobile?"1/2":"auto"}}>
                  <Label>Risk Level</Label>
                  <BigNum value={S.risk} color={S.rColor} size={22}/>
                  <RiskBar level={S.risk} color={S.rColor}/>
                  <div style={{fontSize:11,color:"var(--text-dim)",marginTop:7}}>
                    Ann. Vol  {pct(S.cvar.annVol)}
                  </div>
                </div>

                <Divider/>

                {/* Size */}
                <div style={{padding:"0 0 0 28px"}}>
                  <Label>Recommended Position</Label>
                  <BigNum value={S.size.toFixed(1)} unit="% AUM" color={S.aColor} size={32}/>
                  <SizeBar size={S.size} color={S.aColor}/>
                </div>
              </div>
            </div>

            {/* ── TRADE LEVELS ── */}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10,marginBottom:16}}>
              {[
                {label:"Entry Price",    value:fmt$(R.price),       color:"var(--text)",
                 sub:R.chg>=0?`▲ ${pct(Math.abs(R.chg))} today`:`▼ ${pct(Math.abs(R.chg))} today`,
                 sc:R.chg>=0?C.teal:C.red},
                {label:"Stop Loss (1.5× ATR)",  value:fmt$(S.stop), color:C.red,
                 sub:`−${pct(S.stopPct)} · ATR-based`,sc:C.redLt},
                {label:"Take Profit (3× ATR)",  value:fmt$(S.target),color:C.teal,
                 sub:`+${pct(S.targetPct)} · 2:1 R/R`,sc:C.teal},
                {label:"Hold Period",    value:S.holdDays,          color:C.amber,
                 sub:`Risk/Reward  1 : ${S.rr.toFixed(1)}`,sc:"var(--text-mid)"},
              ].map((c,i)=>(
                <Card key={i} style={{borderLeft:`2px solid ${c.color}40`}}>
                  <Label>{c.label}</Label>
                  <div style={{fontSize:isMobile?16:20,fontWeight:700,color:c.color,lineHeight:1}}>{c.value}</div>
                  <div style={{fontSize:isMobile?11:13,color:c.sc,marginTop:6}}>{c.sub}</div>
                </Card>
              ))}
            </div>

            {/* ── CHARTS + FACTORS ── */}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12,marginBottom:16}}>

              {/* HA Charts */}
              <Card>
                {/* Daily HA */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <Label style={{marginBottom:0}}>{R.ticker}  ·  60D Heikin-Ashi (Daily)</Label>
                  <div style={{display:"flex",gap:10,fontSize:10,color:"var(--text-dim)"}}>
                    <span style={{color:C.teal}}>█ Bull</span>
                    <span style={{color:C.red}}>█ Bear</span>
                  </div>
                </div>
                <HAChart bars={R.haDaily||[]} h={isMobile?80:100}/>
                {/* 1h HA */}
                <div style={{borderTop:"1px solid var(--border)",marginTop:12,paddingTop:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <Label style={{marginBottom:0}}>{R.ticker}  ·  48-Bar Heikin-Ashi (1H)</Label>
                    <span style={{fontSize:10,color:S.mom1h?.trendUp?C.teal:S.mom1h?.trendDn?C.red:C.amber}}>
                      {S.mom1h?.trendUp?"↑ Bullish":S.mom1h?.trendDn?"↓ Bearish":"→ Neutral"}
                    </span>
                  </div>
                  <HAChart bars={R.haHourly||[]} h={isMobile?60:72}/>
                </div>
                {/* SPY sparkline */}
                <div style={{borderTop:"1px solid var(--border)",marginTop:12,paddingTop:12}}>
                  <Label>SPY  ·  Regime Proxy (Daily)</Label>
                  <Spark data={R.spyC} color={S.hmm.state==="BULL"?C.teal:S.hmm.state==="BEAR"?C.red:C.amber} h={32}/>
                </div>
              </Card>

              {/* Factors */}
              <Card>
                <Label>Factor Breakdown</Label>
                {S.factors.map((f,i)=><FactorRow key={i} label={f.label} value={f.value} color={f.color}/>)}
              </Card>
            </div>

            {/* ── PRICE ACTION ── */}
            {S.pa&&(
              <Card style={{marginBottom:16,borderLeft:`2px solid ${C.blue}40`}}>
                <Label>Price Action Analysis</Label>
                <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr 1fr",gap:12,marginBottom:S.pa.patterns.length>0?14:0}}>
                  {/* Breakout status */}
                  <div style={{padding:"10px 12px",background:"var(--surface2)",borderRadius:3,
                    border:`1px solid ${S.pa.breakout20dHigh?C.teal:S.pa.breakout20dLow?C.red:"var(--border)"}30`}}>
                    <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>BREAKOUT STATUS</div>
                    <div style={{fontSize:14,fontWeight:700,color:S.pa.breakout20dHigh?C.teal:S.pa.breakout20dLow?C.red:C.amber}}>
                      {S.pa.breakout20dHigh?"Above 20D High ↑":S.pa.breakout5dHigh?"Above 5D High ↑":S.pa.breakout20dLow?"Below 20D Low ↓":"Inside Range"}
                    </div>
                    <div style={{fontSize:11,color:"var(--text-mid)",marginTop:3}}>
                      Range: ${S.pa.lo20.toFixed(2)} – ${S.pa.hi20.toFixed(2)}
                    </div>
                  </div>
                  {/* Trend structure */}
                  <div style={{padding:"10px 12px",background:"var(--surface2)",borderRadius:3,
                    border:`1px solid ${S.pa.hhll==="HH+HL"?C.teal:S.pa.hhll==="LH+LL"?C.red:"var(--border)"}30`}}>
                    <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>SWING STRUCTURE</div>
                    <div style={{fontSize:14,fontWeight:700,color:S.pa.hhll==="HH+HL"?C.teal:S.pa.hhll==="LH+LL"?C.red:C.amber}}>
                      {S.pa.hhll}
                    </div>
                    <div style={{fontSize:11,color:"var(--text-mid)",marginTop:3}}>
                      {S.pa.hhll==="HH+HL"?"Uptrend — Higher Highs & Higher Lows"
                      :S.pa.hhll==="LH+LL"?"Downtrend — Lower Highs & Lower Lows"
                      :S.pa.hhll==="HH+LL"?"Expanding range — volatile"
                      :"Contracting range — breakout pending"}
                    </div>
                  </div>
                  {/* S/R levels */}
                  <div style={{padding:"10px 12px",background:"var(--surface2)",borderRadius:3,border:"1px solid var(--border)"}}>
                    <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>KEY LEVELS</div>
                    <div style={{fontSize:12,color:C.red,fontWeight:600}}>
                      R: {S.pa.nearestRes?`$${S.pa.nearestRes.toFixed(2)} (+${pct(S.pa.distToRes||0,1)})`:"—"}
                    </div>
                    <div style={{fontSize:11,color:"var(--text-mid)",marginTop:2}}>Current: ${R.price.toFixed(2)}</div>
                    <div style={{fontSize:12,color:C.teal,fontWeight:600,marginTop:2}}>
                      S: {S.pa.nearestSup?`$${S.pa.nearestSup.toFixed(2)} (−${pct(S.pa.distToSup||0,1)})`:"—"}
                    </div>
                  </div>
                </div>
                {/* Candlestick patterns */}
                {S.pa.patterns.length>0&&(
                  <div style={{borderTop:"1px solid var(--border)",paddingTop:12}}>
                    <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:8}}>CANDLESTICK PATTERNS DETECTED</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {S.pa.patterns.map((p,i)=>(
                        <div key={i} style={{padding:"5px 12px",borderRadius:3,fontSize:12,fontWeight:600,
                          background:`${p.bias>0?C.teal:p.bias<0?C.red:C.mid}18`,
                          border:`1px solid ${p.bias>0?C.teal:p.bias<0?C.red:C.mid}44`,
                          color:p.bias>0?C.teal:p.bias<0?C.red:C.mid}}>
                          {p.bias>0?"▲":p.bias<0?"▼":"◆"} {p.name}
                          <span style={{fontSize:10,opacity:.7,marginLeft:6}}>{p.strength}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {S.pa.patterns.length===0&&(
                  <div style={{fontSize:12,color:"var(--text-dim)",marginTop:4}}>No significant candlestick pattern on last bar</div>
                )}
              </Card>
            )}

            {/* ── SCENARIO TABLE ── */}
            <Card style={{marginBottom:18}}>
              <Label>Position Sizing  —  Scenario Analysis</Label>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr>
                      {(isMobile?["Scenario","Action","Size %","Stop","Target"]:["Scenario","Action","Size %","Kelly γ","Regime","Risk Mult","Stop","Target"]).map(h=>(
                        <th key={h} style={{fontSize:11,color:"#9BA8BC",letterSpacing:1.5,
                          padding:"0 8px 8px",textAlign:"left",fontWeight:600,
                          borderBottom:"1px solid var(--border)"}}>
                          {h}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {scenarios.map((row,i)=>{
                      const regM={BULL:1,TRANSITION:.5,BEAR:0}[S.hmm.state]??0;
                      const rkM={LOW:1,MEDIUM:.75,HIGH:.5,EXTREME:.25}[S.risk];
                      const sz=clamp(Math.round(S.kelly.fAdj*regM*rkM*row.aMult*1000)/10,0,15);
                      const active=S.action===row.action;
                      return(
                        <tr key={i} className="scenario">
                          <td style={{padding:"9px 10px",borderBottom:"1px solid var(--border)",
                            fontSize:13,color:active?"var(--text)":"var(--text-mid)",fontWeight:active?600:400}}>
                            {active&&<span style={{color:S.aColor,marginRight:7}}>►</span>}
                            {row.label}
                          </td>
                          <td style={{padding:"9px 10px",borderBottom:"1px solid var(--border)",
                            fontSize:13,color:row.aColor,fontWeight:600,letterSpacing:1}}>
                            {row.action}
                          </td>
                          <td style={{padding:"9px 10px",borderBottom:"1px solid var(--border)",
                            fontSize:active?15:12,color:active?S.aColor:"var(--text-mid)",fontWeight:active?700:400}}>
                            {sz.toFixed(1)}%
                          </td>
                          {!isMobile&&[`${(row.g*100).toFixed(0)}%`,`${(regM*100).toFixed(0)}%`,
                            `${(rkM*100).toFixed(0)}%`].map((v,j)=>(
                            <td key={j} style={{padding:"9px 10px",borderBottom:"1px solid var(--border)",
                              fontSize:13,color:"#B0BBC9"}}>{v}</td>
                          ))}
                          <td style={{padding:isMobile?"7px 8px":"9px 10px",borderBottom:"1px solid var(--border)",
                            fontSize:13,color:C.redLt}}>{fmt$(S.stop)}</td>
                          <td style={{padding:isMobile?"7px 8px":"9px 10px",borderBottom:"1px solid var(--border)",
                            fontSize:13,color:C.teal}}>{fmt$(S.target)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:10,fontSize:11,color:"var(--text-dim)"}}>
                ► Active scenario  ·  Size = f* × γ(0.33) × Regime Mult × Risk Mult  ·  Kelly calibrated on 10-day fwd returns  ·  Hard cap 15%
              </div>
            </Card>

            {/* ── ANALYST NOTES ── */}
            {S.notes.length>0&&(
              <Card style={{marginBottom:18,borderLeft:`2px solid ${C.amber}40`,
                background:`${C.amber}05`}}>
                <Label>Analyst Notes</Label>
                {S.notes.map((n,i)=>(
                  <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",
                    marginBottom:i<S.notes.length-1?8:0}}>
                    <span style={{color:C.amber,marginTop:1,flexShrink:0}}>◆</span>
                    <span style={{fontSize:13,color:"var(--text-mid)",lineHeight:1.6}}>{n}</span>
                  </div>
                ))}
              </Card>
            )}

            {/* ── HMM REGIME ── */}
            <Card style={{marginBottom:4}}>
              <Label>SPY Regime  —  HMM State Decomposition</Label>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(5,1fr)",gap:0}}>
                {[
                  {l:"Current State", v:S.hmm.label,          c:S.hmm.state==="BULL"?C.teal:S.hmm.state==="BEAR"?C.red:C.amber},
                  {l:"Confidence",    v:pct(S.hmm.conf),       c:C.amber},
                  {l:"SPY  MA200",    v:fmt$(S.hmm.ma200),     c:"var(--text-mid)"},
                  {l:"SPY  MA50",     v:fmt$(S.hmm.ma50),      c:"var(--text-mid)"},
                  {l:"Realized Vol",  v:pct(S.hmm.vol),        c:S.hmm.vol<.20?C.teal:S.hmm.vol<.30?C.amber:C.red},
                ].map((m,i)=>(
                  <div key={i} style={{textAlign:"center",padding:"12px 8px",
                    borderRight:isMobile?(i%2===0?"1px solid var(--border)":"none"):(i<4?"1px solid var(--border)":"none"),
                    borderBottom:isMobile&&i<4?"1px solid var(--border)":"none"}}>
                    <div style={{fontSize:11,color:"var(--text-dim)",letterSpacing:1.5,marginBottom:7}}>{m.l}</div>
                    <div style={{fontSize:17,color:m.c,fontWeight:700}}>{m.v}</div>
                  </div>
                ))}
              </div>
              <div style={{borderTop:"1px solid var(--border)",marginTop:12,paddingTop:10,
                fontSize:12,color:"var(--text-dim)"}}>
                Strategy implication:  {S.hmm.state==="BULL"
                  ?"Normal execution mode — Kelly sizing active — Momentum overlay ON"
                  :S.hmm.state==="TRANSITION"
                  ?"Reduced sizing mode — 0.5× Kelly — New entries require higher conviction"
                  :"Defensive mode — position reduction — No new long entries"}
              </div>
            </Card>

            {/* Footer */}
            <div style={{fontSize:11,color:"var(--text-dim)",textAlign:"center",
              marginTop:24,paddingTop:14,borderTop:"1px solid var(--border)"}}>
              QUANT EDGE v2.0  ·  Data: Twelve Data API  ·  {R.ts}  ·  FOR RESEARCH USE ONLY — NOT FINANCIAL ADVICE
            </div>
          </div>
        )}

        {/* Empty state */}
        {!R&&!loading&&(
          <div style={{textAlign:"center",padding:"80px 0",color:"var(--text-dim)"}}>
            <div style={{fontSize:12,letterSpacing:4,marginBottom:12}}>READY</div>
            <div style={{fontSize:36,color:"var(--border2)",marginBottom:14}}>◈</div>
            <div style={{fontSize:12,letterSpacing:3,color:"var(--text-dim)"}}>ENTER A TICKER SYMBOL TO BEGIN ANALYSIS</div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
