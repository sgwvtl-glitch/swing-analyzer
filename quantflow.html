<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantFlow Max | Dual-TF Terminal</title>
    
    <script src="config.js" onerror="alert('CRITICAL: config.js not found in the same folder!')"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-slate-100 font-mono selection:bg-blue-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const QuantTerminal = () => {
            const [ticker, setTicker] = useState('NVDA');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [countdown, setCountdown] = useState(120);
            const [configError, setConfigError] = useState(false);
            const timerRef = useRef(null);

            // --- INITIAL CONFIG CHECK ---
            useEffect(() => {
                if (!window.CONFIG || !window.CONFIG.TWELVE_DATA_API_KEY || window.CONFIG.TWELVE_DATA_API_KEY.includes('YOUR_')) {
                    setConfigError(true);
                }
            }, []);

            const fetchAnalysis = async (symbol) => {
                if (configError) return;
                setLoading(true);
                try {
                    const API_KEY = window.CONFIG.TWELVE_DATA_API_KEY;
                    // SINGLE BATCH CALL for efficiency
                    const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1day,1h&outputsize=100&apikey=${API_KEY}&indicators=ema(20),macd,rsi`;
                    const res = await fetch(url);
                    const json = await res.json();

                    if (json['1day'] && json['1h']) {
                        const d = json['1day'].values[0];
                        const h = json['1h'].values[0];

                        // DAILY STRATEGY (EMA20 Slope/Position)
                        const dailyTrend = parseFloat(d.close) > parseFloat(d.ema20) ? 'LONG' : 'SHORT';
                        
                        // HOURLY TACTICAL (MACD & RSI)
                        const hRsi = parseFloat(h.rsi) || 0;
                        const hMacdLine = parseFloat(h.macd) || 0;
                        const hMacdSignal = parseFloat(h.macd_signal) || 0;
                        const hTrigger = hMacdLine > hMacdSignal ? 'BULLISH' : 'BEARISH';

                        // 10-HOUR RANGE for Entry
                        const hHigh = Math.max(...json['1h'].values.slice(0, 10).map(v => parseFloat(v.high)));
                        const hLow = Math.min(...json['1h'].values.slice(0, 10).map(v => parseFloat(v.low)));

                        // SCORING: 5 if Daily Bias matches Hourly Trigger
                        const isAligned = (dailyTrend === 'LONG' && hTrigger === 'BULLISH') || (dailyTrend === 'SHORT' && hTrigger === 'BEARISH');

                        setData({
                            price: parseFloat(h.close),
                            dailyTrend, hRsi, hTrigger, hHigh, hLow,
                            score: isAligned ? 5 : 2
                        });
                        setCountdown(120);
                    }
                } catch (e) { console.error("Fetch Error:", e); }
                setLoading(false);
            };

            useEffect(() => {
                if (!configError) {
                    fetchAnalysis(ticker);
                    timerRef.current = setInterval(() => {
                        setCountdown(prev => {
                            if (prev <= 1) { fetchAnalysis(ticker); return 120; }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timerRef.current);
            }, [ticker, configError]);

            if (configError) return (
                <div class="min-h-screen flex items-center justify-center p-6 text-center">
                    <div class="bg-red-950 border-2 border-red-500 p-8 rounded-[3rem] max-w-sm">
                        <h2 class="text-3xl font-black text-red-500 mb-4 tracking-tighter uppercase">Config Error</h2>
                        <p class="text-sm font-bold text-red-200">Missing TWELVE_DATA_API_KEY in config.js</p>
                    </div>
                </div>
            );

            return (
                <div class="max-w-md mx-auto min-h-screen p-6 pt-10 pb-20">
                    <header class="flex justify-between items-end mb-8 border-b border-slate-800 pb-4">
                        <h1 class="text-3xl font-black italic tracking-tighter">QUANT_MAX</h1>
                        <span class="text-blue-500 font-black text-xl">{countdown}s</span>
                    </header>

                    <form onSubmit={(e) => { e.preventDefault(); fetchAnalysis(ticker); }} class="mb-8 flex gap-2">
                        <input value={ticker} onChange={e => setTicker(e.target.value.toUpperCase())} class="flex-1 bg-slate-900 border-2 border-slate-800 p-5 rounded-3xl font-black text-3xl uppercase outline-none focus:border-blue-500 transition-all" />
                        <button type="submit" class="bg-blue-600 px-8 rounded-3xl font-black text-xl active:scale-95">{loading ? "..." : "GO"}</button>
                    </form>

                    {data && (
                        <div class="space-y-6 animate-in slide-in-from-bottom-8 duration-700">
                            {/* STRATEGY BIAS (DAILY) */}
                            <div class={`p-10 rounded-[3rem] text-center shadow-2xl ${data.dailyTrend === 'LONG' ? 'bg-emerald-600' : 'bg-red-900'}`}>
                                <p class="text-xs font-black uppercase opacity-70 mb-2 tracking-widest italic">Daily Strategy Filter</p>
                                <div class="text-7xl font-black tracking-tighter">{data.dailyTrend}</div>
                            </div>

                            {/* TACTICAL TRIGGER (1-HOUR) */}
                            <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 grid grid-cols-2 gap-6">
                                <div>
                                    <p class="text-xs text-slate-500 font-black uppercase mb-1">1H RSI</p>
                                    <p class={`text-4xl font-black ${data.hRsi < 40 ? 'text-emerald-400' : data.hRsi > 60 ? 'text-red-400' : 'text-white'}`}>{data.hRsi.toFixed(1)}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-500 font-black uppercase mb-1">1H MACD</p>
                                    <p class={`text-xl font-black ${data.hTrigger === 'BULLISH' ? 'text-emerald-400' : 'text-red-400'}`}>{data.hTrigger}</p>
                                </div>
                            </div>

                            {/* EXECUTION BOX */}
                            <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 text-center">
                                <p class="text-xs text-slate-500 font-black uppercase mb-1">Execution Price</p>
                                <p class="text-6xl font-black text-blue-500 tracking-tighter mb-4">${data.price.toFixed(2)}</p>
                                <div class="flex justify-between text-[10px] font-black text-slate-500 border-t border-slate-800 pt-4">
                                    <span>1H LOW: ${data.hLow.toFixed(2)}</span>
                                    <span>1H HIGH: ${data.hHigh.toFixed(2)}</span>
                                </div>
                            </div>

                            {/* FINAL STATUS */}
                            <div class={`p-6 rounded-3xl text-center font-black text-xl uppercase italic shadow-xl ${data.score === 5 ? 'bg-blue-600' : 'bg-slate-800'}`}>
                                {data.score === 5 ? `Signal Confirmed: ${data.dailyTrend}` : "Wait for 1H Alignment"}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuantTerminal />);
    </script>
</body>
</html>
