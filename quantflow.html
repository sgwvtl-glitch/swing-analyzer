<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantFlow | Config Shield</title>
    
    <script src="config.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-slate-100 font-mono">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const QuantApp = () => {
            const [hasKey, setHasKey] = useState(true);
            const [ticker, setTicker] = useState('NVDA');
            const [data, setData] = useState(null);

            // 2. CHECK KEY ON MOUNT
            useEffect(() => {
                const key = window.CONFIG?.TWELVE_DATA_API_KEY;
                if (!key || key === 'PASTE_YOUR_KEY_HERE') {
                    setHasKey(false);
                }
            }, []);

            if (!hasKey) {
                return (
                    <div class="flex items-center justify-center min-h-screen p-6">
                        <div class="bg-red-950 border-2 border-red-500 p-8 rounded-[2.5rem] text-center max-w-sm">
                            <h2 class="text-3xl font-black text-red-500 mb-4 tracking-tighter uppercase">Key Error</h2>
                            <p class="text-sm text-red-200 leading-relaxed font-bold">
                                Missing <span class="bg-red-500/20 px-1">TWELVE_DATA_API_KEY</span> in your <span class="underline">config.js</span> file. 
                                <br/><br/>
                                Ensure both files are in the same folder.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div class="max-w-md mx-auto p-10 text-center">
                    <h1 class="text-4xl font-black text-blue-500 italic mb-10">QUANT_ACTIVE</h1>
                    <div class="bg-slate-900 p-10 rounded-[3rem] border border-slate-800">
                        <p class="text-xs font-black uppercase text-slate-500 mb-2 tracking-widest">System Status</p>
                        <p class="text-2xl font-black text-emerald-400">CONFIG_LOADED</p>
                        <p class="text-[10px] text-slate-600 mt-2">ID: {window.CONFIG.TWELVE_DATA_API_KEY.substring(0,5)}***</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuantApp />);
    </script>
</body>
</html>
