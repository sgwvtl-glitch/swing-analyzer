<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantFlow Max | 1-10D Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-slate-100 font-mono selection:bg-blue-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. HARDCODE YOUR API KEY HERE
        // ==========================================
        const API_KEY = '934f233f1c934c92a767bb9e52191d6d'; 
        // ==========================================

        const QuantTerminal = () => {
            const [inputSymbol, setInputSymbol] = useState('SPY');
            const [activeTicker, setActiveTicker] = useState(null);
            const [metrics, setMetrics] = useState(null);
            const [loading, setLoading] = useState(false);
            const [countdown, setCountdown] = useState(120);
            const timerRef = useRef(null);

            const fetchEngineData = async (symbol) => {
                if (!API_KEY || API_KEY.includes('YOUR_')) return;
                setLoading(true);
                try {
                    // outputsize=100 ensures RSI(14) and MACD(12,26) have enough buffer to calculate
                    const url = `https://api.twelvedata.com/time_series?symbol=${symbol},SPY&interval=1day&outputsize=100&apikey=${API_KEY}&indicators=ema(20),sma(50),macd,rsi`;
                    const res = await fetch(url);
                    const json = await res.json();

                    if (json[symbol]?.values && json['SPY']?.values) {
                        const t = json[symbol].values;
                        const s = json['SPY'].values;

                        // --- 1. TREND & MOMENTUM ---
                        const currentEMA = parseFloat(t[0].ema20);
                        const prevEMA = parseFloat(t[1].ema20);
                        const trend = currentEMA > prevEMA ? 'UP' : 'DOWN';
                        const mom60_5 = (parseFloat(t[5].close) / parseFloat(t[60].close)) - 1;

                        // --- 2. OSCILLATORS (RSI & MACD) ---
                        const rsi = parseFloat(t[0].rsi) || 0;
                        const macdLine = parseFloat(t[0].macd) || 0;
                        const macdSignal = parseFloat(t[0].macd_signal) || 0;
                        const macdCross = macdLine > macdSignal ? 'BULLISH' : 'BEARISH';

                        // --- 3. SUPPORT & RESISTANCE (5-Day Pivot) ---
                        const high5 = Math.max(...t.slice(1, 6).map(v => parseFloat(v.high)));
                        const low5 = Math.min(...t.slice(1, 6).map(v => parseFloat(v.low)));
                        const pivot = (high5 + low5 + parseFloat(t[1].close)) / 3;
                        const r1 = (2 * pivot) - low5;
                        const s1 = (2 * pivot) - high5;

                        // --- 4. GLOBAL REGIME ---
                        const isRiskOn = parseFloat(s[0].close) > parseFloat(s[0].sma50);

                        // --- 5. COMPOSITE SCORING (0-5) ---
                        let score = 0;
                        if (isRiskOn) score += 1;
                        if (trend === 'UP') score += 1;
                        if (macdCross === 'BULLISH') score += 1;
                        if (rsi > 40 && rsi < 70) score += 1; // Not overbought
                        if (mom60_5 > 0) score += 1;

                        setMetrics({
                            price: parseFloat(t[0].close),
                            trend, rsi, macdCross, r1, s1,
                            regime: isRiskOn ? 'RISK_ON' : 'RISK_OFF',
                            score
                        });
                        setCountdown(120);
                    }
                } catch (e) { console.error("Engine Error:", e); }
                setLoading(false);
            };

            const handleGo = (e) => {
                e.preventDefault();
                setActiveTicker(inputSymbol);
                fetchEngineData(inputSymbol);
            };

            useEffect(() => {
                if (activeTicker) {
                    timerRef.current = setInterval(() => {
                        setCountdown(prev => {
                            if (prev <= 1) { fetchEngineData(activeTicker); return 120; }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timerRef.current);
            }, [activeTicker]);

            return (
                <div class="max-w-md mx-auto min-h-screen p-6 pt-12 pb-20">
                    <header class="flex justify-between items-center mb-10">
                        <h1 class="text-3xl font-black text-white italic tracking-tighter">QUANT_MAX</h1>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-500 font-bold uppercase">Update In</p>
                            <p class="text-xl font-black text-blue-500 leading-none">{countdown}s</p>
                        </div>
                    </header>

                    <form onSubmit={handleGo} class="mb-10 flex gap-3">
                        <input 
                            value={inputSymbol} 
                            onChange={e => setInputSymbol(e.target.value.toUpperCase())}
                            class="flex-1 bg-slate-900 border-2 border-slate-800 p-5 rounded-[2rem] font-black text-3xl uppercase outline-none focus:border-blue-600 transition-colors"
                            placeholder="TICKER"
                        />
                        <button type="submit" class="bg-blue-600 px-8 rounded-[2rem] font-black text-xl hover:bg-blue-500 active:scale-95 transition-all shadow-lg shadow-blue-900/20">
                            {loading ? "..." : "GO"}
                        </button>
                    </form>

                    {metrics && (
                        <div class="space-y-6 animate-in fade-in slide-in-from-bottom-6 duration-700">
                            {/* ALPHA SCORE BOARD */}
                            <div class={`p-10 rounded-[3.5rem] text-center shadow-2xl ${metrics.score >= 4 ? 'bg-emerald-600' : metrics.score >= 2 ? 'bg-blue-600' : 'bg-red-900'}`}>
                                <p class="text-xs font-black uppercase tracking-widest opacity-70 mb-2">Alpha Signal</p>
                                <div class="text-9xl font-black tracking-tighter mb-2">{metrics.score}</div>
                                <p class="text-2xl font-black uppercase tracking-tight">
                                    {metrics.regime === 'RISK_OFF' ? 'WAIT (MARKET RISK)' : metrics.score >= 4 ? 'STRONG ENTRY' : 'MONITOR'}
                                </p>
                            </div>

                            {/* PRICE & TREND */}
                            <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 flex justify-between items-center">
                                <div>
                                    <p class="text-xs text-slate-500 font-black uppercase mb-1">Spot Price</p>
                                    <p class="text-5xl font-black text-white">${metrics.price.toFixed(2)}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs text-slate-500 font-black uppercase mb-1">20D Trend</p>
                                    <p class={`text-3xl font-black ${metrics.trend === 'UP' ? 'text-emerald-400' : 'text-red-400'}`}>{metrics.trend}</p>
                                </div>
                            </div>

                            {/* INDICATORS GRID */}
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                                    <p class="text-xs text-slate-500 font-black uppercase mb-2">RSI (14)</p>
                                    <p class="text-3xl font-black">{metrics.rsi.toFixed(1)}</p>
                                </div>
                                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                                    <p class="text-xs text-slate-500 font-black uppercase mb-2">MACD</p>
                                    <p class={`text-xl font-black ${metrics.macdCross === 'BULLISH' ? 'text-emerald-400' : 'text-red-400'}`}>{metrics.macdCross}</p>
                                </div>
                            </div>

                            {/* S/R VISUALIZER */}
                            <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 space-y-4">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-black text-red-500 uppercase italic">Resistance (R1)</span>
                                    <span class="text-xl font-black">${metrics.r1.toFixed(2)}</span>
                                </div>
                                <div class="w-full bg-slate-950 h-4 rounded-full relative border border-slate-800 p-1">
                                    <div 
                                        class="h-full bg-gradient-to-r from-emerald-500 to-blue-500 rounded-full transition-all duration-1000" 
                                        style={{width: `${Math.min(100, Math.max(0, ((metrics.price - metrics.s1) / (metrics.r1 - metrics.s1)) * 100))}%`}}
                                    ></div>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-black text-emerald-500 uppercase italic">Support (S1)</span>
                                    <span class="text-xl font-black">${metrics.s1.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuantTerminal />);
    </script>
</body>
</html>
